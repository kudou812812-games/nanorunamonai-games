<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e1726">
<title>Plant Up! — 化学プラント</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Jost:wght@300;400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0e1726;touch-action:manipulation}
body{font-family:'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
 color:#eef2f7;display:flex;flex-direction:column;align-items:center;
 touch-action:none;user-select:none;-webkit-user-select:none;
 background:radial-gradient(120% 90% at 50% 0%,#1b2c46 0%,#0e1726 60%,#070d16 100%)}
#wrap{width:100%;max-width:440px;height:100%;display:flex;flex-direction:column;
 padding:max(8px,env(safe-area-inset-top)) 12px max(8px,env(safe-area-inset-bottom))}
header{display:flex;align-items:flex-end;justify-content:space-between;padding:6px 4px 8px}
.title{font-size:20px;font-weight:700;letter-spacing:.28em}
.title small{display:block;font-size:9px;letter-spacing:.42em;color:rgba(244,238,226,.5);
 font-weight:500;margin-top:3px;text-indent:.42em}
.scores{text-align:right;line-height:1.15}
.hud{display:flex;align-items:flex-end;gap:8px}
#score{font-size:30px;font-weight:700;color:#ff8c3a;letter-spacing:.04em}
#best{font-size:10px;letter-spacing:.24em;color:rgba(244,238,226,.5)}
#mute{appearance:none;border:1px solid rgba(255,140,58,.4);background:rgba(14,23,38,.62);color:#ff9b52;border-radius:999px;width:34px;height:34px;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
#mute:active{transform:scale(.94)}
#chain{display:flex;gap:3px;justify-content:center;padding:2px 0 7px;flex-wrap:nowrap}
#chain i{width:9px;height:9px;border-radius:50%;background:rgba(244,238,226,.12);
 transition:all .3s;display:block}
.field-wrap{position:relative;flex:1;min-height:0;border-radius:14px 14px 20px 20px;
 overflow:hidden;border:1px solid rgba(244,238,226,.14);
 background:linear-gradient(to bottom,rgba(10,7,14,.55),rgba(12,9,18,.85))}
#game{display:block;width:100%;height:100%;touch-action:manipulation}
.foot{text-align:center;font-size:11px;letter-spacing:.26em;
 color:rgba(244,238,226,.45);padding:6px 0 3px}
.foot .hint{font-size:11px;letter-spacing:.26em}
/* brand credit — matches the NANORUNAMONAI logo (reuse this block across apps) */
.brand{position:relative;display:inline-flex;flex-direction:column;align-items:center;
 gap:2px;margin-top:11px;padding:0}
.brand .en{font-family:'Jost',sans-serif;font-weight:300;
 font-size:9px;letter-spacing:.5em;text-indent:.5em;color:rgba(246,240,228,.62)}
#over{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
 justify-content:center;gap:16px;background:rgba(10,7,14,.82);
 -webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);z-index:5}
#over.show{display:flex;animation:fade .5s ease}
#start{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(10,16,25,.82);-webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);z-index:5;padding:24px}
#start:not(.show){display:none}#start .st-title{font-size:28px;font-weight:700;letter-spacing:.12em;text-indent:.12em;color:#ffd2a4}#start .st-sub{font-size:10px;letter-spacing:.22em;text-indent:.22em;color:rgba(244,238,226,.56);margin-top:-9px}.mode-row{display:flex;gap:10px;width:100%;max-width:330px}.mode-btn{flex:1;font-family:inherit;border:1px solid rgba(255,140,58,.45);background:rgba(255,255,255,.07);color:#f4eee2;border-radius:8px;padding:15px 8px 13px;cursor:pointer}.mode-btn b{display:block;font-size:16px;letter-spacing:.16em}.mode-btn small{display:block;font-size:9px;letter-spacing:.08em;color:rgba(244,238,226,.58);margin-top:5px}.mode-btn:active{transform:scale(.97)}
@keyframes fade{from{opacity:0}to{opacity:1}}
#over{justify-content:center;gap:14px;padding:24px}
#over .ov-frame{position:relative;width:100%;max-width:340px;
 padding:30px 26px;margin-bottom:4px;border-radius:6px;
 background:linear-gradient(135deg,rgba(40,30,18,.55),rgba(22,16,10,.55));
 border:1px solid rgba(233,194,90,.5);
 box-shadow:0 0 0 1px rgba(233,194,90,.12) inset,0 8px 40px rgba(0,0,0,.5);
 overflow:hidden}
/* sweeping gold shimmer across the frame */
#over .ov-frame::before{content:'';position:absolute;top:-60%;left:-30%;
 width:40%;height:220%;transform:rotate(18deg);
 background:linear-gradient(90deg,rgba(255,231,158,0),rgba(255,231,158,.32),rgba(255,231,158,0));
 animation:sweep 3.6s ease-in-out infinite}
@keyframes sweep{0%{left:-40%}55%{left:120%}100%{left:120%}}
#over .ov-frame::after{content:'';position:absolute;inset:5px;border-radius:3px;
 border:1px solid rgba(233,194,90,.22);pointer-events:none}
#over .corner{position:absolute;width:14px;height:14px;border:2px solid #e9c25a;opacity:.85}
#over .corner.tl{top:7px;left:7px;border-right:0;border-bottom:0}
#over .corner.tr{top:7px;right:7px;border-left:0;border-bottom:0}
#over .corner.bl{bottom:7px;left:7px;border-right:0;border-top:0}
#over .corner.br{bottom:7px;right:7px;border-left:0;border-top:0}
#over .ov-q-ja{position:relative;font-size:18px;font-weight:600;letter-spacing:.06em;
 line-height:1.95;color:#f6eccf;text-align:center;
 text-wrap:balance;text-wrap:pretty;line-break:strict;word-break:normal;
 text-shadow:0 1px 12px rgba(0,0,0,.5)}
#over .ov-q-en{position:relative;font-size:11px;letter-spacing:.06em;line-height:1.7;
 color:rgba(233,194,90,.85);text-align:center;margin-top:12px;font-style:italic;
 text-wrap:balance;text-wrap:pretty}
#over .ov-t{font-size:34px;letter-spacing:.3em;font-weight:700;color:#ff8a6b;
 text-indent:.3em;text-shadow:0 2px 18px rgba(255,80,60,.45),0 0 2px rgba(0,0,0,.6)}
#over .ov-s{font-size:46px;color:#e9c25a;font-weight:700;margin-top:-2px}
#over .ov-l{font-size:11px;letter-spacing:.26em;color:rgba(244,238,226,.6);margin-top:-10px}
/* prominent stamp for the title, then stagger the rest in */
#over.show .ov-t{animation:stampIn .55s cubic-bezier(.2,1.3,.4,1) both}
#over.show .ov-s{animation:rise .6s .55s both}
#over.show .ov-l{animation:rise .6s .68s both}
#over.show .ov-frame{animation:rise .7s .82s both}
#over.show .btn{animation:rise .6s 1.0s both}
@keyframes stampIn{0%{opacity:0;transform:scale(1.8) rotate(-7deg)}
 60%{opacity:1}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
/* one-shot red flash on the field at the moment of game over */
#flash{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:4;
 background:radial-gradient(120% 90% at 50% 18%,rgba(230,40,40,.55),rgba(230,40,40,0) 70%)}
#flash.go{animation:flash .6s ease-out}
@keyframes flash{0%{opacity:0}12%{opacity:1}100%{opacity:0}}
/* danger warning banner while flowers linger above the line */
#danger{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:4;
 font-size:14px;letter-spacing:.28em;font-weight:700;color:#fff;
 background:rgba(210,40,40,.9);padding:6px 16px;border-radius:999px;
 box-shadow:0 2px 14px rgba(210,40,40,.5);opacity:0;pointer-events:none;
 transition:opacity .25s}
#danger.on{opacity:1;animation:dpulse .7s ease-in-out infinite}
@keyframes dpulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.08)}}
.btn{font-family:inherit;font-size:14px;letter-spacing:.26em;color:#14101c;font-weight:600;
 background:#e9c25a;border:none;border-radius:999px;padding:13px 30px;cursor:pointer}
.btn:active{transform:scale(.96)}
</style>
</head>
<body>
<div id="wrap">
 <header>
  <div class="title">Plant Up!<small>CHEMICAL PLANT MERGE</small></div>
  <div class="hud"><div class="scores"><div id="score">0</div><div id="best">最高 0</div></div><button id="mute" aria-label="音を切り替え">♪</button></div>
 </header>
 <div id="chain"></div>
 <div class="field-wrap">
  <canvas id="game"></canvas>
  <div id="flash"></div>
  <div id="danger">あふれそう！</div>
  <div id="over">
   <div class="ov-t">おしまい</div>
   <div class="ov-s" id="ovScore">0</div>
   <div class="ov-l" id="ovBest">最高 0</div>
   <div class="ov-frame">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
    <div class="ov-q-ja" id="ovQuoteJa"></div>
    <div class="ov-q-en" id="ovQuoteEn"></div>
   </div>
   <button class="btn" id="again">もう一度</button>
  </div>
  <div id="start" class="show"><div class="st-title">Plant Up!</div><div class="st-sub">CHEMICAL PLANT MERGE</div><div class="mode-row"><button class="mode-btn" data-mode="normal"><b>NORMAL</b><small>いつもの成長</small></button><button class="mode-btn" data-mode="easy"><b>EASY</b><small>ゆったり成長</small></button></div></div>
 </div>
 <div class="foot">
  <div class="hint">― 触れて狙い、はなして落とす ―</div>
  <div class="brand"><span class="en">NANORUNAMONAI</span></div>
 </div>
</div>

let lastQuote=-1;

const SPAWN_MAX=4; // only tiers 0..4 drop

/* ---------- state ---------- */

let balls=[],parts=[],score=0,best=0,over=false,started=false,MODE='normal';
let spawnTier=0,nextTier=0,spawnX=0,spawnAnim=0,canDrop=true,dropCool=0,aiming=false;
const REST=0.12,DAMP=0.992,ITER=6;
const MODES={normal:{size:1,spawnMax:4,grace:2.2,cool:.45,gravity:2600,key:'plant_best'},easy:{size:.86,spawnMax:3,grace:3.2,cool:.38,gravity:2400,key:'plant_best_easy'}};
function cfg(){return MODES[MODE]}

function loadBest(){try{best=parseInt(localStorage.getItem(cfg().key)||'0')||0}catch(e){best=0}}

let audioCtx=null,muted=false;
function audio(){if(!audioCtx){const C=window.AudioContext||window.webkitAudioContext;if(C)audioCtx=new C()}return audioCtx}
function unlockAudio(){const a=audio();if(a&&a.state==='suspended')a.resume()}
function tone(freq,dur,type='sine',vol=.05,slide=1){const a=audio();if(!a||muted)return;const t=a.currentTime,o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(Math.max(1,freq*slide),t+dur);g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+.012);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+.02)}
function sDrop(){tone(320,.09,'triangle',.075,.58);setTimeout(()=>tone(180,.06,'sine',.035,.8),28)}function sMerge(t){tone(380+t*28,.15,'triangle',.065,1.55);tone(760+t*32,.12,'sine',.025,1.15)}function sOver(){tone(220,.28,'sawtooth',.05,.55);setTimeout(()=>tone(145,.34,'sine',.055,.55),110)}

function rsz(){
 const oldW=W,oldH=Hh,wrap=cv.parentElement.getBoundingClientRect();
 DPR=Math.min(2,window.devicePixelRatio||1);
 W=wrap.width;Hh=wrap.height;
 cv.width=W*DPR;cv.height=Hh*DPR;c.setTransform(DPR,0,0,DPR,0,0);
 scale=W/380;wallPad=6*scale;dropY=Math.max(64*scale,Hh*0.12);
 warnY=dropY;deadY=Math.max(26*scale,Hh*0.052);if(oldW&&balls.length){const sx=W/oldW,sy=Hh/oldH;balls.forEach(b=>{b.x*=sx;b.y*=sy;b.vx*=sx;b.vy*=sy;b.r=radius(b.t)})}
}

function rndSpawn(){return Math.floor(Math.random()*(cfg().spawnMax+1))}
function newSpawn(){spawnTier=nextTier;nextTier=rndSpawn();spawnAnim=0;canDrop=true;
 spawnX=clamp(spawnX||W/2,wallPad+radius(spawnTier),W-wallPad-radius(spawnTier))}

function reset(){balls=[];parts=[];score=0;over=false;dropCool=0;aiming=false;gameTime=0;dangerLevel=0;
 nextTier=rndSpawn();newSpawn();spawnX=W/2;document.getElementById('over').classList.remove('show');
 if(dangerEl)dangerEl.classList.remove('on');
 if(flashEl)flashEl.classList.remove('go');
 upd()}
function upd(){document.getElementById('score').textContent=score;
 document.getElementById('best').textContent='最高 '+best;
 const top=balls.reduce((m,b)=>Math.max(m,b.t),0);
 chainEls.forEach((e,i)=>{e.style.background=i<=top?rgba(PIECES[i].tint,1):'rgba(244,238,226,.12)';
  e.style.transform=i===top?'scale(1.5)':'scale(1)'})}

/* ---------- physics ---------- */
let ballId=0,gameTime=0,dangerLevel=0,overAt=0;
function addBall(t,x,y,vx=0,vy=0){balls.push({id:++ballId,t,x,y,vx,vy,r:radius(t),rot:(Math.random()-.5)*.14,
 vr:(Math.random()-.5)*0.7,sleep:0,over:0,touch:{},born:gameTime})}
function burst(x,y,tint,n){const lt=lighten(hex(tint),.4);for(let i=0;i<n;i++){const a=Math.random()*TAU,s=Math.random()*300+70;
 parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-110,life:1,col:Math.random()<.5?rgba(lt,1):tint,
  sz:Math.random()*5+3,rot:Math.random()*TAU,vr:(Math.random()-.5)*10})}}

function step(dt){
 gameTime+=dt;
 for(const b of balls){if(b.held)continue;
  b.vy+=cfg().gravity*dt;b.x+=b.vx*dt;b.y+=b.vy*dt;b.rot+=b.vr*dt;
  b.vx*=DAMP;b.vr*=0.94;b.rot*=0.95}
 // merges first: same tier + touching (or persistently in contact)
 outer:for(let i=0;i<balls.length;i++)for(let j=i+1;j<balls.length;j++){
  const a=balls[i],b=balls[j];if(a.t!==b.t||a.held||b.held||a.dead||b.dead)continue;
  if(a.t>=PIECES.length-1)continue;
  const d=Math.hypot(b.x-a.x,b.y-a.y),touching=d<(a.r+b.r)*1.02;
  if(touching){a.touch[b.id]=(a.touch[b.id]||0)+1;
   if(d<(a.r+b.r)*0.99||a.touch[b.id]>=2){
    a.dead=b.dead=true;
    const nt=a.t+1,nx=(a.x+b.x)/2,ny=(a.y+b.y)/2;
    addBall(nt,nx,ny,(a.vx+b.vx)/2,(a.vy+b.vy)/2-60);
    burst(nx,ny,PIECES[a.t].tint,16);sMerge(nt);
    score+=(a.t+1)*(a.t+2)/2;
    if(score>best){best=score;saveBest()}
    upd();break outer}}
  else if(a.touch[b.id])a.touch[b.id]=0}
 if(balls.some(b=>b.dead))balls=balls.filter(b=>!b.dead);
 for(let it=0;it<ITER;it++){
  for(const b of balls){if(b.held)continue;
   if(b.x-b.r<wallPad){b.x=wallPad+b.r;b.vx=Math.abs(b.vx)*REST}
   if(b.x+b.r>W-wallPad){b.x=W-wallPad-b.r;b.vx=-Math.abs(b.vx)*REST}
   if(b.y+b.r>Hh-wallPad){b.y=Hh-wallPad-b.r;b.vy=-Math.abs(b.vy)*REST;b.vx*=0.9}}
  for(let i=0;i<balls.length;i++)for(let j=i+1;j<balls.length;j++){
   const a=balls[i],b=balls[j];let dx=b.x-a.x,dy=b.y-a.y;let d=Math.hypot(dx,dy)||0.01;
   const min=a.r+b.r;
   if(d<min){const nx=dx/d,ny=dy/d,ov=min-d;
    const ma=a.r*a.r,mb=b.r*b.r,tot=ma+mb;
    const pa=a.held?0:(mb/tot),pb=b.held?0:(ma/tot);
    a.x-=nx*ov*pa;a.y-=ny*ov*pa;b.x+=nx*ov*pb;b.y+=ny*ov*pb;
    const rv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
    if(rv<0){const imp=-(1+REST)*rv/2;
     if(!a.held){a.vx-=imp*nx;a.vy-=imp*ny}if(!b.held){b.vx+=imp*nx;b.vy+=imp*ny}}}}
 }
 // particles
 for(const q of parts){q.vy+=900*dt;q.x+=q.vx*dt;q.y+=q.vy*dt;q.rot+=q.vr*dt;q.life-=dt*1.4}
 if(parts.length)parts=parts.filter(q=>q.life>0);
 // two-line danger: cross the WARNING line → tension builds; only the DEADLINE ends it
 if(!over){let go=false,dmax=0,topMost=Infinity;
  for(const b of balls){if(b.held)continue;
   const fresh=(gameTime-b.born)<1.8;const top=b.y-b.r;
   if(fresh){b.over=0;continue}
   if(top<topMost)topMost=top;
   if(top<deadY){b.over+=dt;if(b.over>cfg().grace)go=true}else b.over=Math.max(0,b.over-dt*2.0);
   if(b.over>dmax)dmax=b.over}
  const prox=topMost<Infinity?clamp((warnY-topMost)/(warnY-deadY),0,1):0;
  dangerLevel=clamp(Math.max(prox,dmax/2.2),0,1);
  if(dangerEl)dangerEl.classList.toggle('on',topMost<warnY);
  if(go)gameOver()}
 if(dropCool>0){dropCool-=dt;if(dropCool<=0){newSpawn()}}
 else if(spawnAnim<1){spawnAnim=Math.min(1,spawnAnim+dt*4)}
}
function gameOver(){over=true;sOver();overAt=performance.now();
 if(dangerEl)dangerEl.classList.remove('on');
 // mark the flowers that overflowed, for the blink
 for(const b of balls){b.cul=(!b.held&&(gameTime-b.born)>=1.8&&b.y-b.r<deadY)}
 // red flash
 if(flashEl){flashEl.classList.remove('go');void flashEl.offsetWidth;flashEl.classList.add('go')}
 document.getElementById('ovScore').textContent=score;
 document.getElementById('ovBest').textContent='最高 '+best;
 const q=pickQuote();
 const qja=document.getElementById('ovQuoteJa'),qen=document.getElementById('ovQuoteEn');
 qja.textContent=q.ja;qen.textContent=q.en;
 // reveal the panel after a short, legible beat so the end is clearly felt
 const ov=document.getElementById('over');ov.classList.remove('show');

  requestAnimationFrame(()=>{fitText(qja,3,12.5);fitText(qen,4,8.5)})},650)}
// shrink font until the text fits within maxLines (keeps all quotes inside the frame)
function fitText(el,maxLines,minPx){
 el.style.fontSize='';
 const cs=getComputedStyle(el);let fs=parseFloat(cs.fontSize);
 const lh=parseFloat(cs.lineHeight)||fs*1.7;let guard=0;
 while(el.scrollHeight>lh*maxLines+1&&fs>minPx&&guard<48){fs-=0.5;el.style.fontSize=fs+'px';guard++}
}

/* ---------- render ---------- */
function drawFlower(b){const t=b.t,r=b.r,ar=PIECES[t].aspect||1;
 c.save();c.translate(b.x,b.y);
 // colored glow halo (psychedelic)
 c.save();c.globalCompositeOperation='screen';
 const gl=c.createRadialGradient(0,0,0,0,0,r*1.25);
 gl.addColorStop(0,rgba(PIECES[t].tint,.5));gl.addColorStop(1,rgba(PIECES[t].tint,0));
 c.fillStyle=gl;c.beginPath();c.arc(0,0,r*1.25,0,TAU);c.fill();c.restore();
 // soft ground shadow
 c.save();c.globalAlpha=.3;
 const sg=c.createRadialGradient(0,r*.8,0,0,r*.8,r*1.02);
 sg.addColorStop(0,'rgba(0,0,0,.85)');sg.addColorStop(1,'rgba(0,0,0,0)');
 c.fillStyle=sg;c.beginPath();c.ellipse(0,r*.84,r*.98,r*.32,0,0,TAU);c.fill();c.restore();
 // sprite sized to CONTAIN within the collision diameter (longer side = 2r),
 // so very wide (lorry/plant) and very tall (drum) pieces stay consistent
 const base=2*r*1.0;let dw,dh;
 if(ar>=1){dw=base;dh=base/ar}else{dh=base;dw=base*ar}
 const im=IMG[t];c.rotate(b.rot*0.35);
 if(im&&im.complete&&im.naturalWidth){c.drawImage(im,-dw/2,-dh/2,dw,dh);}
 else{c.fillStyle=rgba(PIECES[t].tint,1);c.beginPath();c.arc(0,0,r*.7,0,TAU);c.fill()}
 c.restore()}
// Plant Up! backdrop: navy works at dusk — blueprint grid, plant silhouette, drifting sparks
function psycheBG(t){
 const sky=c.createLinearGradient(0,0,0,Hh);
 sky.addColorStop(0,'#0d1828');sky.addColorStop(0.6,'#13233a');sky.addColorStop(1,'#1a2c44');
 c.fillStyle=sky;c.fillRect(0,0,W,Hh);
 // faint blueprint grid
 c.save();c.strokeStyle='rgba(120,170,230,0.06)';c.lineWidth=1;
 const gs=Math.max(28,W/12);
 for(let x=0;x<=W;x+=gs){c.beginPath();c.moveTo(x,0);c.lineTo(x,Hh);c.stroke()}
 for(let y=0;y<=Hh;y+=gs){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke()}
 c.restore();
 // soft work-light glows
 c.save();c.globalCompositeOperation='screen';
 const glows=[[0.25,0.3,'#2a4a7a'],[0.75,0.26,'#244a6a'],[0.5,0.5,'#3a3a5a']];
 for(let i=0;i<glows.length;i++){const x=W*(glows[i][0]+0.05*Math.sin(t*0.16+i*1.7));
  const y=Hh*(glows[i][1]+0.04*Math.cos(t*0.14+i*2.1));const r=Math.max(W,Hh)*0.4;
  const g=c.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,rgba(hex(glows[i][2]),.4));g.addColorStop(1,rgba(hex(glows[i][2]),0));
  c.fillStyle=g;c.beginPath();c.arc(x,y,r,0,TAU);c.fill()}
 c.restore();
 // industrial silhouette along the bottom: tanks, towers, pipes, chimneys
 const baseY=Hh*0.96;c.save();c.fillStyle='#0a1320';c.strokeStyle='rgba(160,200,240,0.10)';c.lineWidth=1.5;
 const u=W/14;
 function box(x,w,h){c.fillRect(x,baseY-h,w,h);c.strokeRect(x,baseY-h,w,h)}
 // distillation towers
 box(u*1.2,u*0.5,Hh*0.30);box(u*2.0,u*0.4,Hh*0.24);
 // a couple round tanks (domed)
 for(const[cxu,wu,hu] of [[u*4.4,u*1.3,0.16],[u*9.6,u*1.5,0.18]]){
  const x=cxu,w=wu,h=Hh*hu;c.beginPath();
  c.moveTo(x,baseY);c.lineTo(x,baseY-h);c.arc(x+w/2,baseY-h,w/2,Math.PI,0);c.lineTo(x+w,baseY);c.closePath();
  c.fill();c.stroke()}
 // tall reactor + chimney with blinking light
 box(u*6.6,u*0.7,Hh*0.4);box(u*12.2,u*0.45,Hh*0.46);
 // connecting pipe rack
 c.strokeStyle='rgba(160,200,240,0.12)';c.lineWidth=2;
 c.beginPath();c.moveTo(0,baseY-Hh*0.1);c.lineTo(W,baseY-Hh*0.1);c.stroke();
 c.fillStyle=baseY?'#0a1320':'#000';c.fillRect(0,baseY,W,Hh-baseY);
 // chimney aviation light (blink)
 const blink=0.5+0.5*Math.sin(t*3);

 c.beginPath();c.arc(u*12.2+u*0.225,baseY-Hh*0.46,3,0,TAU);c.fill();
 c.restore();
 // drifting steel/orange sparks
 c.save();c.globalCompositeOperation='screen';
 const sp=['#ff8c3a','#9fc4e8','#e8e8e8','#ffb070'];
 for(let i=0;i<18;i++){c.fillStyle=sp[i%sp.length];
  const x=((i*101.7+t*12)%(W+20))-10;
  const y=((i*57.3 - t*16 + Hh)%(Hh*0.9))-6;
  c.globalAlpha=0.08+0.12*(0.5+0.5*Math.sin(t*1.4+i));
  c.beginPath();c.arc(x,y,(i%2)+0.9,0,TAU);c.fill()}
 c.globalAlpha=1;c.restore();
}
function render(){
 c.clearRect(0,0,W,Hh);
 psycheBG(performance.now()/1000);
 const dl=clamp(dangerLevel,0,1);
 // danger band fills the zone between the warning line and the deadline as flowers climb
 if(dl>0.02&&!over){
  const pulse=0.5+0.5*Math.sin(performance.now()/140);
  const a=dl*(0.16+0.22*pulse);
  const gd=c.createLinearGradient(0,0,0,warnY);
  gd.addColorStop(0,`rgba(225,40,40,${a})`);gd.addColorStop(1,'rgba(225,40,40,0)');

 }
 // ---- line drawing helper ----
 function drawLine(y,rgb,label,solid,inten){
  const cs=`${rgb[0]},${rgb[1]},${rgb[2]}`;
  const sh=c.createLinearGradient(0,y,0,y+16*scale);
  sh.addColorStop(0,`rgba(${cs},${0.12+0.18*inten})`);sh.addColorStop(1,`rgba(${cs},0)`);
  c.fillStyle=sh;c.fillRect(0,y,W,16*scale);
  c.save();
  c.shadowColor=`rgba(${cs},${0.4+0.5*inten})`;c.shadowBlur=(5+11*inten)*scale;
  c.strokeStyle=`rgba(${cs},${(solid?0.6:0.42)+0.4*inten})`;
  c.lineWidth=((solid?1.8:1.3)+2.4*inten)*scale;
  if(!solid){c.setLineDash([5*scale,8*scale])}
  c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();
  c.setLineDash([]);c.restore();
  // moving dashes overlay
  const ph=(performance.now()/120)%(16*scale);
  c.setLineDash([5*scale,9*scale]);c.lineDashOffset=-ph;
  c.strokeStyle=`rgba(${cs},${0.22+0.5*inten})`;c.lineWidth=(0.8+1.4*inten)*scale;
  c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();c.setLineDash([]);c.lineDashOffset=0;
  // end diamonds
  c.fillStyle=`rgba(${cs},.9)`;
  for(const ex of [7*scale,W-7*scale]){c.save();c.translate(ex,y);c.rotate(Math.PI/4);
   const s=((solid?3.4:2.6)+1.6*inten)*scale;c.fillRect(-s,-s,2*s,2*s);c.restore()}
  // label
  c.font=`${10*scale}px 'Shippori Mincho',serif`;c.textAlign='left';c.textBaseline='bottom';
  c.fillStyle=`rgba(${cs},${0.5+0.4*inten})`;
  c.fillText(label,9*scale,y-4*scale);
 }
 // WARNING line (amber) — flowers crossing it start the tension
 const warnInt=clamp(dl*1.3,0,1);
 drawLine(warnY,[233,170,70],'警告ライン',false,warnInt*0.6);
 // DEADLINE (red, solid, near the top) — reaching it ends the game

 drawLine(deadY,deadRGB,'デッドライン',true,dl);
 for(const b of balls)drawFlower(b);
 // culprit blink + darkening veil during the game-over beat
 if(over){
  const el=(performance.now()-overAt)/1000;
  const blink=0.5+0.5*Math.sin(el*16);
  for(const b of balls){if(!b.cul)continue;
   c.save();c.translate(b.x,b.y);c.globalAlpha=0.35+0.45*blink;
   c.strokeStyle='rgba(240,70,70,.95)';c.lineWidth=Math.max(2,b.r*.08);
   c.beginPath();c.arc(0,0,b.r*1.04,0,TAU);c.stroke();c.restore()}
  c.fillStyle=`rgba(10,7,12,${clamp(el/0.65,0,1)*0.55})`;c.fillRect(0,0,W,Hh);
 }
 for(const q of parts){c.save();c.globalAlpha=clamp(q.life,0,1);c.translate(q.x,q.y);c.rotate(q.rot);
  c.fillStyle=q.col;shpPoint(c,q.sz*2,q.sz*1.3);c.fill();c.restore()}
 if(!over&&dropCool<=0){
  const r=radius(spawnTier);const y=dropY-r-6*scale;
  const x=clamp(spawnX,wallPad+r,W-wallPad-r);spawnX=x;
  c.save();c.globalAlpha=.4;c.strokeStyle='rgba(244,238,226,.4)';c.setLineDash([3,5]);
  c.beginPath();c.moveTo(x,y+r);c.lineTo(x,Hh);c.stroke();c.setLineDash([]);c.restore();
  drawFlower({x,y,r:r*(0.6+0.4*spawnAnim),rot:0,t:spawnTier})}
}

/* ---------- loop ---------- */
let last=0,acc=0;
function frame(now){const dt=Math.min(0.033,(now-last)/1000||0);last=now;
 if(started&&!over){acc+=dt;const fs=1/120;let n=0;while(acc>=fs&&n<8){step(fs);acc-=fs;n++}}
 render();requestAnimationFrame(frame)}

function move(e){if(!started||over||dropCool>0)return;spawnX=px(e);e.preventDefault()}
function up(e){if(!started||over||dropCool>0||!canDrop||!aiming)return;
 const r=radius(spawnTier),x=clamp(spawnX,wallPad+r,W-wallPad-r);

 sDrop();aiming=false;canDrop=false;dropCool=cfg().cool;e.preventDefault()}
