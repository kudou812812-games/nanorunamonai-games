<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0612">
<title>サイケ×エベレスト — Psychedelic Everest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Jost:wght@300;400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#14101c;touch-action:manipulation}
body{font-family:'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
 color:#f4eee2;display:flex;flex-direction:column;align-items:center;
 touch-action:none;user-select:none;-webkit-user-select:none;
 background:radial-gradient(120% 90% at 50% 0%,#241a2e 0%,#14101c 60%,#0c0810 100%)}
#wrap{width:100%;max-width:440px;height:100%;display:flex;flex-direction:column;
 padding:max(8px,env(safe-area-inset-top)) 12px max(8px,env(safe-area-inset-bottom))}
header{display:flex;align-items:flex-end;justify-content:space-between;padding:6px 4px 8px;gap:8px}
.title{font-size:16px;font-weight:700;letter-spacing:.12em;line-height:1.2}
.title small{display:block;font-size:8px;letter-spacing:.34em;color:rgba(244,238,226,.5);
 font-weight:500;margin-top:3px;text-indent:.34em}
.hud{display:flex;align-items:flex-start;gap:8px}
.scores{text-align:right;line-height:1.15}
#score{font-size:30px;font-weight:700;color:#e9c25a;letter-spacing:.04em}
#best{font-size:10px;letter-spacing:.24em;color:rgba(244,238,226,.5)}
#mute{appearance:none;border:1px solid rgba(255,255,255,.18);border-radius:12px;
 width:38px;height:38px;background:rgba(255,255,255,.06);color:#f4eee2;
 font-size:17px;line-height:1;box-shadow:0 0 16px rgba(180,60,255,.18);cursor:pointer}
#mute:active{transform:scale(.94)}
#chain{display:flex;gap:3px;justify-content:center;padding:2px 0 7px;flex-wrap:nowrap}
#chain i{width:9px;height:9px;border-radius:50%;background:rgba(244,238,226,.12);
 transition:all .3s;display:block}
.field-wrap{position:relative;flex:1;min-height:0;border-radius:14px 14px 20px 20px;
 overflow:hidden;border:1px solid rgba(244,238,226,.10);
 background:linear-gradient(to bottom,rgba(10,7,14,.55),rgba(12,9,18,.85));
 box-shadow:inset 0 0 46px rgba(138,43,226,.22),inset 0 0 90px rgba(13,58,110,.18)}
.field-wrap::after{content:'';position:absolute;inset:0;border-radius:inherit;padding:2px;z-index:3;
 background:conic-gradient(from 0deg,#ff2d95,#ff8a3d,#ffd23f,#33d9ff,#8a2be2,#ff2d95);
 -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
 -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
 opacity:.5;animation:framehue 6s linear infinite,frameglow 3.2s ease-in-out infinite}
body.strong .field-wrap{box-shadow:inset 0 0 70px rgba(138,43,226,.34),inset 0 0 130px rgba(13,58,110,.26)}
body.strong .field-wrap::after{padding:4px;
 background:conic-gradient(from 0deg,#ff2d95,#ff8a3d,#ffd23f,#6dff3d,#33d9ff,#8a2be2,#ff2d95);
 opacity:.85;filter:saturate(1.4);
 animation:framehue 2.6s linear infinite,frameglow 1.6s ease-in-out infinite}
@keyframes framehue{to{filter:hue-rotate(360deg)}}
@keyframes frameglow{0%,100%{opacity:.4}50%{opacity:.75}}
@media (prefers-reduced-motion:reduce){.field-wrap::after{animation:none;opacity:.5}}
#game{display:block;width:100%;height:100%;touch-action:manipulation}
.foot{text-align:center;font-size:11px;letter-spacing:.26em;
 color:rgba(244,238,226,.45);padding:6px 0 3px}
.foot .hint{font-size:11px;letter-spacing:.26em}
/* brand credit — matches the NANORUNAMONAI logo (reuse this block across apps) */
.brand{position:relative;display:inline-flex;flex-direction:column;align-items:center;
 gap:2px;margin-top:11px;padding:0}
.brand .en{font-family:'Jost',sans-serif;font-weight:300;
 font-size:9px;letter-spacing:.5em;text-indent:.5em;color:rgba(246,240,228,.62)}
#menu{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
 justify-content:center;gap:10px;z-index:6;padding:18px;text-align:center;
 background:radial-gradient(120% 90% at 50% 30%,rgba(20,10,40,.62),rgba(8,5,14,.86));
 -webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
#menu.show{display:flex;animation:fade .5s ease}
.menu-logo{display:flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:8px}
.menu-logo .en{font-family:'Jost',sans-serif;font-weight:300;font-size:15px;letter-spacing:.46em;
 text-indent:.46em;color:rgba(247,242,236,.94);text-shadow:0 0 16px rgba(167,121,255,.45)}
.menu-logo .rule{width:52px;height:1px;margin-top:4px;
 background:linear-gradient(90deg,rgba(233,194,90,0),rgba(233,194,90,.55),rgba(233,194,90,0))}
.menu-title{font-size:21px;font-weight:700;letter-spacing:.06em;line-height:1.25;
 max-width:100%;text-align:center;
 background:linear-gradient(90deg,#ff5db1,#ffd23f,#5ad7ff,#a779ff,#ff5db1);
 -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
 background-size:300% 100%;animation:flow 5s linear infinite}
.menu-title .w{white-space:nowrap}
.menu-title .x{font-size:17px;opacity:.85;-webkit-text-fill-color:#ffd23f;padding:0 .12em}
@keyframes flow{to{background-position:300% 0}}
.menu-sub{font-family:'Jost',sans-serif;font-weight:300;font-size:10px;letter-spacing:.5em;
 text-indent:.5em;color:rgba(246,240,228,.6);margin-top:-6px}
.menu-lead{font-size:12px;letter-spacing:.2em;color:rgba(246,240,228,.7);margin:6px 0 2px}
.mode-btn{width:min(80%,300px);font-family:inherit;cursor:pointer;color:#f6efe4;
 background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.16);border-radius:16px;
 padding:11px 14px;display:flex;flex-direction:column;gap:3px;align-items:center;
 transition:transform .12s,box-shadow .3s,background .3s}
.mode-btn b{font-family:'Jost',sans-serif;font-weight:400;font-size:17px;letter-spacing:.2em;text-indent:.2em}
.mode-btn small{font-size:10px;letter-spacing:.08em;color:rgba(246,240,228,.62)}
.mode-btn:active{transform:scale(.97)}
.mode-btn.strong{border-color:transparent;
 background:linear-gradient(rgba(20,8,30,.7),rgba(20,8,30,.7)) padding-box,
  conic-gradient(from 0deg,#ff2d95,#ff8a3d,#ffd23f,#6dff3d,#33d9ff,#8a2be2,#ff2d95) border-box;
 border:2px solid transparent;animation:framehue 3s linear infinite;
 box-shadow:0 0 22px rgba(180,60,255,.4)}
.mode-btn.strong b{background:linear-gradient(90deg,#ff5db1,#ffd23f,#5ad7ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.mode-btn.easy{background:rgba(233,194,90,.08);border-color:rgba(233,194,90,.34)}
.mode-btn.easy b{color:#ffd36d}
.mode-btn.strong.easy{background:linear-gradient(rgba(36,18,36,.72),rgba(36,18,36,.72)) padding-box,
  conic-gradient(from 0deg,#ffd23f,#6dff3d,#33d9ff,#ff2d95,#ffd23f) border-box}
.menu-brand{margin-top:10px;display:flex;flex-direction:column;gap:1px;line-height:1.2}
.menu-brand .en{font-family:'Jost',sans-serif;font-weight:300;font-size:9px;letter-spacing:.5em;text-indent:.5em;color:rgba(246,240,228,.5)}
#over{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
 justify-content:center;gap:16px;background:rgba(10,7,14,.82);
 -webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);z-index:5}
#over.show{display:flex;animation:fade .5s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
#over{justify-content:center;gap:14px;padding:24px}
#over .ov-frame{position:relative;width:100%;max-width:340px;
 padding:30px 26px;margin-bottom:4px;border-radius:6px;
 background:linear-gradient(135deg,rgba(40,30,18,.55),rgba(22,16,10,.55));
 border:1px solid rgba(233,194,90,.5);
 box-shadow:0 0 0 1px rgba(233,194,90,.12) inset,0 8px 40px rgba(0,0,0,.5);
 overflow:hidden}
/* sweeping gold shimmer across the frame */
#over .ov-frame::before{content:'';position:absolute;top:-60%;left:-30%;
 width:40%;height:220%;transform:rotate(18deg);
 background:linear-gradient(90deg,rgba(255,231,158,0),rgba(255,231,158,.32),rgba(255,231,158,0));
 animation:sweep 3.6s ease-in-out infinite}
@keyframes sweep{0%{left:-40%}55%{left:120%}100%{left:120%}}
#over .ov-frame::after{content:'';position:absolute;inset:5px;border-radius:3px;
 border:1px solid rgba(233,194,90,.22);pointer-events:none}
#over .corner{position:absolute;width:14px;height:14px;border:2px solid #e9c25a;opacity:.85}
#over .corner.tl{top:7px;left:7px;border-right:0;border-bottom:0}
#over .corner.tr{top:7px;right:7px;border-left:0;border-bottom:0}
#over .corner.bl{bottom:7px;left:7px;border-right:0;border-top:0}
#over .corner.br{bottom:7px;right:7px;border-left:0;border-top:0}
#over .ov-q-ja{position:relative;font-size:18px;font-weight:600;letter-spacing:.06em;
 line-height:1.95;color:#f6eccf;text-align:center;
 text-wrap:balance;text-wrap:pretty;line-break:strict;word-break:normal;
 text-shadow:0 1px 12px rgba(0,0,0,.5)}
#over .ov-q-en{position:relative;font-size:11px;letter-spacing:.06em;line-height:1.7;
 color:rgba(233,194,90,.85);text-align:center;margin-top:12px;font-style:italic;
 text-wrap:balance;text-wrap:pretty}
#over .ov-t{font-size:34px;letter-spacing:.3em;font-weight:700;color:#ff8a6b;
 text-indent:.3em;text-shadow:0 2px 18px rgba(255,80,60,.45),0 0 2px rgba(0,0,0,.6)}
#over .ov-s{font-size:46px;color:#e9c25a;font-weight:700;margin-top:-2px}
#over .ov-l{font-size:11px;letter-spacing:.26em;color:rgba(244,238,226,.6);margin-top:-10px}
/* prominent stamp for the title, then stagger the rest in */
#over.show .ov-t{animation:stampIn .55s cubic-bezier(.2,1.3,.4,1) both}
#over.show .ov-s{animation:rise .6s .55s both}
#over.show .ov-l{animation:rise .6s .68s both}
#over.show .ov-frame{animation:rise .7s .82s both}
#over.show .btn{animation:rise .6s 1.0s both}
@keyframes stampIn{0%{opacity:0;transform:scale(1.8) rotate(-7deg)}
 60%{opacity:1}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
/* one-shot red flash on the field at the moment of game over */
#flash{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:4;
 background:radial-gradient(120% 90% at 50% 18%,rgba(230,40,40,.55),rgba(230,40,40,0) 70%)}
#flash.go{animation:flash .6s ease-out}
@keyframes flash{0%{opacity:0}12%{opacity:1}100%{opacity:0}}
/* danger warning banner while flowers linger above the line */
#danger{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:4;
 font-size:14px;letter-spacing:.28em;font-weight:700;color:#fff;
 background:rgba(210,40,40,.9);padding:6px 16px;border-radius:999px;
 box-shadow:0 2px 14px rgba(210,40,40,.5);opacity:0;pointer-events:none;
 transition:opacity .25s}
#danger.on{opacity:1;animation:dpulse .7s ease-in-out infinite}
@keyframes dpulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.08)}}
.btn{font-family:inherit;font-size:14px;letter-spacing:.26em;color:#14101c;font-weight:600;
 background:#e9c25a;border:none;border-radius:999px;padding:13px 30px;cursor:pointer}
.btn:active{transform:scale(.96)}
</style>
</head>
<body>
<div id="wrap">
 <header>
  <div class="title">サイケデリック×エベレスト<small id="titleSub">PSYCHEDELIC EVEREST</small></div>
  <div class="hud">
   <div class="scores"><div id="score">0</div><div id="best">最高 0</div></div>
   <button id="mute" aria-label="音を切り替え">♪</button>
  </div>
 </header>
 <div id="chain"></div>
 <div class="field-wrap">
  <canvas id="game"></canvas>
  <div id="flash"></div>
  <div id="danger">あふれそう！</div>
  <div id="menu" class="show">
   <div class="menu-logo"><span class="en">NANORUNAMONAI</span><span class="rule"></span></div>
   <div class="menu-title"><span class="w">サイケデリック</span><span class="x">×</span><span class="w">エベレスト</span></div>
   <div class="menu-sub">PSYCHEDELIC EVEREST</div>
   <div class="menu-lead">モードを選んでください</div>
   <button class="mode-btn" data-strong="0" data-easy="0"><b>NORMAL</b><small>標準の極彩色</small></button>
   <button class="mode-btn easy" data-strong="0" data-easy="1"><b>NORMAL EASY</b><small>ゆるく登る極彩色</small></button>
   <button class="mode-btn strong" data-strong="1" data-easy="0"><b>STRONG</b><small>爆発・発光・山・震動 全部マシマシ</small></button>
   <button class="mode-btn strong easy" data-strong="1" data-easy="1"><b>STRONG EASY</b><small>派手さそのまま、遊びやすく</small></button>
  </div>
  <div id="over">
   <div class="ov-t">おしまい</div>
   <div class="ov-s" id="ovScore">0</div>
   <div class="ov-l" id="ovBest">最高 0</div>
   <div class="ov-frame">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
    <div class="ov-q-ja" id="ovQuoteJa"></div>
    <div class="ov-q-en" id="ovQuoteEn"></div>
   </div>
   <button class="btn" id="again">もう一度</button>
  </div>
 </div>
 <div class="foot">
  <div class="hint">― 触れて狙い、はなして落とす ―</div>
  <div class="brand"><span class="en">NANORUNAMONAI</span></div>
 </div>
</div>

let AC=null,master=null,psyTimer=null,muted=false,lastWarn=0;
function audioReady(){
 if(AC)return AC;
 const C=window.AudioContext||window.webkitAudioContext;if(!C)return null;
 AC=new C();master=AC.createGain();master.gain.value=muted?0:(STRONG?.28:.20);
 master.connect(AC.destination);return AC;
}
function unlockAudio(){const ac=audioReady();if(ac&&ac.state==='suspended')ac.resume()}
function setVol(){
 if(!master)return;
 master.gain.cancelScheduledValues(AC.currentTime);
 master.gain.setTargetAtTime(muted?0:(STRONG?.28:.20),AC.currentTime,.04);
}
function tone(freq,dur=.12,type='sawtooth',gain=.08,slide=1,delay=0){
 const ac=audioReady();if(!ac||muted)return;
 const t=ac.currentTime+delay,o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
 o.type=type;o.frequency.setValueAtTime(freq,t);
 o.frequency.exponentialRampToValueAtTime(Math.max(35,freq*slide),t+dur);
 f.type='bandpass';f.frequency.setValueAtTime(freq*(STRONG?2.6:1.8),t);
 f.Q.setValueAtTime(STRONG?9:6,t);
 g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(gain,t+.012);
 g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
 o.connect(f);f.connect(g);g.connect(master);o.start(t);o.stop(t+dur+.04);
}
function noise(dur=.18,gain=.06,delay=0){
 const ac=audioReady();if(!ac||muted)return;
 const t=ac.currentTime+delay,len=Math.max(1,Math.floor(ac.sampleRate*dur));

function step(dt){
 gameTime+=dt;
 for(const b of balls){if(b.held)continue;
  b.vy+=cfg().gravity*dt;b.x+=b.vx*dt;b.y+=b.vy*dt;b.rot+=b.vr*dt;
  b.vx*=DAMP;b.vr*=0.94;b.rot*=0.95}
 // merges first: same tier + touching (or persistently in contact)
 outer:for(let i=0;i<balls.length;i++)for(let j=i+1;j<balls.length;j++){
  const a=balls[i],b=balls[j];if(a.t!==b.t||a.held||b.held||a.dead||b.dead)continue;
  if(a.t>=PIECES.length-1)continue;
  const d=Math.hypot(b.x-a.x,b.y-a.y),touching=d<(a.r+b.r)*1.02;
  if(touching){a.touch[b.id]=(a.touch[b.id]||0)+1;
   if(d<(a.r+b.r)*0.99||a.touch[b.id]>=2){
    a.dead=b.dead=true;
    const nt=a.t+1,nx=(a.x+b.x)/2,ny=(a.y+b.y)/2;
    addBall(nt,nx,ny,(a.vx+b.vx)/2,(a.vy+b.vy)/2-60);
    burst(nx,ny,PIECES[a.t].tint,STRONG?20:16);
    sMerge(a.t);
    if(STRONG){mergeFlash=1;mergeFlashCol=PIECES[a.t].tint;shake=Math.min(1,0.4+a.t*0.06)}
    score+=(a.t+1)*(a.t+2)/2;
    if(score>best){best=score;saveBest()}
    upd();break outer}}
  else if(a.touch[b.id])a.touch[b.id]=0}
 if(balls.some(b=>b.dead))balls=balls.filter(b=>!b.dead);
 for(let it=0;it<ITER;it++){
  for(const b of balls){if(b.held)continue;
   if(b.x-b.r<wallPad){b.x=wallPad+b.r;b.vx=Math.abs(b.vx)*REST}
   if(b.x+b.r>W-wallPad){b.x=W-wallPad-b.r;b.vx=-Math.abs(b.vx)*REST}
   if(b.y+b.r>Hh-wallPad){b.y=Hh-wallPad-b.r;b.vy=-Math.abs(b.vy)*REST;b.vx*=0.9}}
  for(let i=0;i<balls.length;i++)for(let j=i+1;j<balls.length;j++){
   const a=balls[i],b=balls[j];let dx=b.x-a.x,dy=b.y-a.y;let d=Math.hypot(dx,dy)||0.01;
   const min=a.r+b.r;
   if(d<min){const nx=dx/d,ny=dy/d,ov=min-d;
    const ma=a.r*a.r,mb=b.r*b.r,tot=ma+mb;
    const pa=a.held?0:(mb/tot),pb=b.held?0:(ma/tot);
    a.x-=nx*ov*pa;a.y-=ny*ov*pa;b.x+=nx*ov*pb;b.y+=ny*ov*pb;
    const rv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
    if(rv<0){const imp=-(1+REST)*rv/2;
     if(!a.held){a.vx-=imp*nx;a.vy-=imp*ny}if(!b.held){b.vx+=imp*nx;b.vy+=imp*ny}}}}
 }
 // particles
 for(const q of parts){
  if(q.kind==='ring'){q.r+=q.vr*dt;q.vr*=0.93;q.life-=dt*q.fade}
  else{q.vy+=900*dt;q.x+=q.vx*dt;q.y+=q.vy*dt;q.vx*=0.99;q.vy*=0.99;
   if(q.rot!=null)q.rot+=q.vr*dt;q.life-=dt*q.fade}}
 if(parts.length)parts=parts.filter(q=>q.life>0);
 if(mergeFlash>0)mergeFlash=Math.max(0,mergeFlash-dt*3.2);
 if(shake>0)shake=Math.max(0,shake-dt*3.6);
 // two-line danger: cross the WARNING line → tension builds; only the DEADLINE ends it
 if(!over){let go=false,dmax=0,topMost=Infinity;
  for(const b of balls){if(b.held)continue;
   const fresh=(gameTime-b.born)<1.8;const top=b.y-b.r;
   if(fresh){b.over=0;continue}
   if(top<topMost)topMost=top;
   if(top<deadY){b.over+=dt;if(b.over>cfg().grace)go=true}else b.over=Math.max(0,b.over-dt*2.0);
   if(b.over>dmax)dmax=b.over}
  const prox=topMost<Infinity?clamp((warnY-topMost)/(warnY-deadY),0,1):0;
  dangerLevel=clamp(Math.max(prox,dmax/2.2),0,1);
  if(dangerEl)dangerEl.classList.toggle('on',topMost<warnY);
  if(topMost<warnY)sWarn(dangerLevel);

 else if(spawnAnim<1){spawnAnim=Math.min(1,spawnAnim+dt*4)}
}

 c.clearRect(0,0,W,Hh);
 if(shake>0){const sh=shake*shake,ox=(Math.random()-.5)*20*sh,oy=(Math.random()-.5)*20*sh;
  c.setTransform(DPR,0,0,DPR,ox*DPR,oy*DPR)}
 psycheBG(performance.now()/1000);
 if(mergeFlash>0){c.save();c.globalCompositeOperation='screen';
  c.fillStyle=rgba(hex(mergeFlashCol),mergeFlash*0.20);c.fillRect(0,0,W,Hh);c.restore()}
 const dl=clamp(dangerLevel,0,1);
 // danger band fills the zone between the warning line and the deadline as flowers climb
 if(dl>0.02&&!over){
  const pulse=0.5+0.5*Math.sin(performance.now()/140);
  const a=dl*(0.16+0.22*pulse);
  const gd=c.createLinearGradient(0,0,0,warnY);
  gd.addColorStop(0,`rgba(225,40,40,${a})`);gd.addColorStop(1,'rgba(225,40,40,0)');
  c.fillStyle=gd;c.fillRect(0,0,W,warnY);
 }
 // ---- line drawing helper ----
 function drawLine(y,rgb,label,solid,inten){
  const cs=`${rgb[0]},${rgb[1]},${rgb[2]}`;
  const sh=c.createLinearGradient(0,y,0,y+16*scale);
  sh.addColorStop(0,`rgba(${cs},${0.12+0.18*inten})`);sh.addColorStop(1,`rgba(${cs},0)`);
  c.fillStyle=sh;c.fillRect(0,y,W,16*scale);
  c.save();
  c.shadowColor=`rgba(${cs},${0.4+0.5*inten})`;c.shadowBlur=(5+11*inten)*scale;
  c.strokeStyle=`rgba(${cs},${(solid?0.6:0.42)+0.4*inten})`;
  c.lineWidth=((solid?1.8:1.3)+2.4*inten)*scale;
  if(!solid){c.setLineDash([5*scale,8*scale])}
  c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();
  c.setLineDash([]);c.restore();
  // moving dashes overlay
  const ph=(performance.now()/120)%(16*scale);
  c.setLineDash([5*scale,9*scale]);c.lineDashOffset=-ph;
  c.strokeStyle=`rgba(${cs},${0.22+0.5*inten})`;c.lineWidth=(0.8+1.4*inten)*scale;
  c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();c.setLineDash([]);c.lineDashOffset=0;
  // end diamonds
  c.fillStyle=`rgba(${cs},.9)`;
  for(const ex of [7*scale,W-7*scale]){c.save();c.translate(ex,y);c.rotate(Math.PI/4);
   const s=((solid?3.4:2.6)+1.6*inten)*scale;c.fillRect(-s,-s,2*s,2*s);c.restore()}
  // label
  c.font=`${10*scale}px 'Shippori Mincho',serif`;c.textAlign='left';c.textBaseline='bottom';
  c.fillStyle=`rgba(${cs},${0.5+0.4*inten})`;
  c.fillText(label,9*scale,y-4*scale);
 }
 // WARNING line (amber) — flowers crossing it start the tension
 if(started){
 const warnInt=clamp(dl*1.3,0,1);
 drawLine(warnY,[233,170,70],'警告ライン',false,warnInt*0.6);
 // DEADLINE (red, solid, near the top) — reaching it ends the game
 const deadRGB=over?[235,70,60]:[224,60,52];
 drawLine(deadY,deadRGB,'デッドライン',true,dl);
 }
 for(const b of balls)drawFlower(b);
 // culprit blink + darkening veil during the game-over beat
 if(over){
  const el=(performance.now()-overAt)/1000;
  const blink=0.5+0.5*Math.sin(el*16);
  for(const b of balls){if(!b.cul)continue;
   c.save();c.translate(b.x,b.y);c.globalAlpha=0.35+0.45*blink;
   c.strokeStyle='rgba(240,70,70,.95)';c.lineWidth=Math.max(2,b.r*.08);
   c.beginPath();c.arc(0,0,b.r*1.04,0,TAU);c.stroke();c.restore()}
  c.fillStyle=`rgba(10,7,12,${clamp(el/0.65,0,1)*0.55})`;c.fillRect(0,0,W,Hh);
 }
 c.save();c.globalCompositeOperation='screen';
 for(const q of parts){const al=clamp(q.life,0,1);
  if(q.kind==='ring'){c.globalAlpha=al*0.6;c.strokeStyle=q.col;c.lineWidth=Math.max(1.4,q.r*q.lw);
   c.beginPath();c.arc(q.x,q.y,q.r,0,TAU);c.stroke()}
  else if(q.kind==='spark'){c.globalAlpha=al;c.fillStyle=q.col;
   c.beginPath();c.arc(q.x,q.y,q.sz*(0.6+0.4*al),0,TAU);c.fill()}
  else{c.save();c.globalAlpha=al;c.translate(q.x,q.y);c.rotate(q.rot||0);
   c.fillStyle=q.col;shpPoint(c,q.sz*2,q.sz*1.3);c.fill();c.restore()}}
 c.globalAlpha=1;c.restore();
 if(started&&!over&&dropCool<=0){
  const r=radius(spawnTier);const y=dropY-r-6*scale;
  const x=clamp(spawnX,wallPad+r,W-wallPad-r);spawnX=x;
  c.save();c.globalAlpha=.4;c.strokeStyle='rgba(244,238,226,.4)';c.setLineDash([3,5]);
  c.beginPath();c.moveTo(x,y+r);c.lineTo(x,Hh);c.stroke();c.setLineDash([]);c.restore();
  drawFlower({x,y,r:r*(0.6+0.4*spawnAnim),rot:0,t:spawnTier})}
}

/* ---------- loop ---------- */
let last=0,acc=0;
function frame(now){const dt=Math.min(0.033,(now-last)/1000||0);last=now;
 if(started&&!over){acc+=dt;const fs=1/120;let n=0;while(acc>=fs&&n<8){step(fs);acc-=fs;n++}}
 render();requestAnimationFrame(frame)}

/* ---------- input ---------- */
function px(e){const r=cv.getBoundingClientRect();const cx=(e.touches?e.touches[0]:e).clientX;return cx-r.left}
function down(e){unlockAudio();if(!started||over||dropCool>0)return;spawnX=px(e);e.preventDefault()}
function move(e){if(!started||over||dropCool>0)return;spawnX=px(e);e.preventDefault()}
function up(e){if(!started||over||dropCool>0||!canDrop)return;
 const r=radius(spawnTier),x=clamp(spawnX,wallPad+r,W-wallPad-r);
 addBall(spawnTier,x,dropY-r-6*scale,0,40);
 sDrop(spawnTier);canDrop=false;dropCool=cfg().cool;e.preventDefault()}
cv.addEventListener('pointerdown',down);cv.addEventListener('pointermove',move);
window.addEventListener('pointerup',up);
let lastTouchEnd=0;
document.addEventListener('touchend',e=>{
 const now=Date.now();
 if(now-lastTouchEnd<320)e.preventDefault();
 lastTouchEnd=now;
},{passive:false});
document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});
document.getElementById('again').addEventListener('click',reset);

const chainEls=[];const chain=document.getElementById('chain');
const dangerEl=document.getElementById('danger');
const flashEl=document.getElementById('flash');
const muteEl=document.getElementById('mute');
PIECES.forEach(()=>{const i=document.createElement('i');chain.appendChild(i);chainEls.push(i)});

// ---- mode selection ----
function chooseMode(strong,easy){
 STRONG=strong;EASY=easy;
 startPsyAudio();
 document.body.classList.toggle('strong',strong);
 const sub=strong?'PSYCHEDELIC EVEREST ・ STRONG':'PSYCHEDELIC EVEREST';
 document.getElementById('titleSub').textContent=easy?sub+' ・ EASY':sub;
 loadBest();reset();started=true;
 document.getElementById('menu').classList.remove('show');}
document.querySelectorAll('.mode-btn').forEach(btn=>{
 btn.addEventListener('click',()=>chooseMode(btn.dataset.strong==='1',btn.dataset.easy==='1'));
});
muteEl.addEventListener('click',e=>{
 e.stopPropagation();unlockAudio();muted=!muted;muteEl.textContent=muted?'×':'♪';setVol();
});

rsz();requestAnimationFrame(frame);

// --- quote check mode: open with #quotes to cycle through all 10 (no need to play) ---
if(location.hash==='#quotes'){
 document.getElementById('menu').classList.remove('show');
 over=true;let qi=0;const ov=document.getElementById('over');
 const qja=document.getElementById('ovQuoteJa'),qen=document.getElementById('ovQuoteEn');
 function showQ(){const q=QUOTES[qi%QUOTES.length];
  document.getElementById('ovScore').textContent=(qi%QUOTES.length)+1+' / '+QUOTES.length;
  document.getElementById('ovBest').textContent='名言チェック';
  qja.textContent=q.ja;qen.textContent=q.en;
  ov.classList.add('show');
  requestAnimationFrame(()=>{fitText(qja,3,12.5);fitText(qen,4,8.5)});qi++}
 showQ();setInterval(showQ,2000);
}
