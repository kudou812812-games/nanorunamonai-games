<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a6e7c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>沖縄UP！ — OKINAWA MERGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#8fe3ec; --sky-bot:#d8f6ec;
    --sea-top:#2bc1cf; --sea-bot:#0a7e8e;
    --sand:#f6e6c2; --sand-deep:#e9cf9a;
    --coral:#e8443b; --gold:#ffc24b; --deep:#073b46;
    --ink:#0a4954; --cream:#fff8ea;
    --jar:#bff0f3;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;touch-action:manipulation}
  body{
    font-family:"Noto Sans JP",system-ui,sans-serif;
    color:var(--deep);
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bot) 34%,#bdeede 52%,var(--sea-top) 70%,var(--sea-bot) 100%);
    display:flex;flex-direction:column;align-items:center;
    height:100dvh;overflow:hidden;
    user-select:none;-webkit-user-select:none;touch-action:none;
  }
  /* ambient sun */
  .sun{position:fixed;top:max(10px,env(safe-area-inset-top));right:18px;width:64px;height:64px;border-radius:50%;
    background:radial-gradient(circle at 50% 50%,#fff3c4,#ffd24b 60%,#ffb02e);
    box-shadow:0 0 38px 10px rgba(255,196,75,.55);z-index:0;pointer-events:none}
  .clouds{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.8}
  .cloud{position:absolute;background:#fff;border-radius:50px;filter:blur(.5px);opacity:.85}

  .wrap{position:relative;z-index:2;width:100%;max-width:480px;height:100dvh;
    display:flex;flex-direction:column;align-items:center;padding:0 10px;}

  header{width:100%;display:flex;align-items:flex-start;justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 8px) 4px 4px;gap:8px}
  .brand{line-height:1}
  .brand h1{font-family:"Noto Sans JP",sans-serif;font-weight:500;margin:0;font-size:clamp(26px,8vw,40px);
    color:var(--deep);letter-spacing:.02em;text-shadow:0 1px 2px rgba(255,255,255,.55)}
  .brand .sub{font-family:"Noto Sans JP",sans-serif;font-size:11px;letter-spacing:.32em;font-weight:500;
    color:var(--deep);opacity:.65;margin-top:7px}
  .hud-top{display:flex;gap:7px;align-items:flex-start}
  .scores{display:flex;gap:7px;align-items:stretch}
  .chip{background:rgba(255,255,255,.78);border:2px solid #fff;border-radius:14px;
    padding:6px 11px;text-align:center;min-width:64px;backdrop-filter:blur(3px);
    box-shadow:0 4px 10px rgba(7,59,70,.16)}
  .chip .lab{font-size:9px;letter-spacing:.16em;font-weight:500;color:#0a7e8e;text-transform:uppercase}
  .chip .val{font-family:"Noto Sans JP",sans-serif;font-weight:500;font-size:22px;color:var(--deep);line-height:1.05}
  .chip.best .val{color:var(--coral)}
  #mute{appearance:none;border:2px solid #fff;background:rgba(255,255,255,.78);color:var(--deep);
    width:38px;height:38px;border-radius:14px;font-size:17px;line-height:1;cursor:pointer;
    box-shadow:0 4px 10px rgba(7,59,70,.16);backdrop-filter:blur(3px)}
  #mute:active{transform:scale(.94)}

  .stage{position:relative;flex:1;width:100%;display:flex;align-items:stretch;justify-content:center;min-height:0;padding-bottom:6px}
  /* glass jar frame */
  #jar{position:relative;width:100%;height:100%;touch-action:manipulation;
    border-radius:14px 14px 30px 30px;
    background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(20,160,180,.10) 30%,rgba(10,126,142,.16));
    border:3px solid rgba(255,255,255,.7);
    box-shadow:inset 0 12px 30px rgba(255,255,255,.35),inset 0 -22px 40px rgba(7,59,70,.18),0 14px 30px rgba(7,59,70,.22);
    overflow:hidden}
  /* sand floor inside jar */
  #jar::after{content:"";position:absolute;left:0;right:0;bottom:0;height:34px;
    background:linear-gradient(180deg,var(--sand),var(--sand-deep));
    box-shadow:inset 0 6px 10px rgba(255,255,255,.4)}
  canvas{position:absolute;inset:0;width:100%;height:100%;z-index:2}
  .dangerline{position:absolute;left:8px;right:8px;z-index:1;height:0;
    border-top:2px dashed rgba(232,68,59,.62);opacity:.72;
    transition:opacity .25s,border-color .25s,box-shadow .25s}
  .dangerline.show{opacity:1;border-color:rgba(232,68,59,.98);box-shadow:0 0 14px rgba(232,68,59,.42)}

  /* next + warning row */
  .hud{position:absolute;top:8px;left:8px;right:8px;z-index:3;display:flex;
    align-items:center;justify-content:flex-end;pointer-events:none}
  .next{display:none}
  .next .nimg{width:30px;height:30px;display:flex;align-items:center;justify-content:center}
  .next .nimg img{max-width:100%;max-height:100%;filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
  .next .ntxt{font-size:9px;font-weight:500;letter-spacing:.12em;color:#0a7e8e}
  .next .ntxt b{display:block;font-size:12px;color:var(--deep);font-weight:500;letter-spacing:0}
  .warn{font-family:"Noto Sans JP",sans-serif;font-weight:500;color:#fff;background:var(--coral);
    border-radius:11px;padding:5px 12px;font-size:13px;opacity:0;transform:translateY(-4px);
    transition:.2s;box-shadow:0 4px 10px rgba(232,68,59,.4)}
  .warn.show{opacity:1;transform:none}

  footer{width:100%;display:flex;align-items:center;justify-content:space-between;
    padding:6px 6px calc(env(safe-area-inset-bottom) + 8px)}
  .hint{font-size:12px;font-weight:500;color:var(--deep);opacity:.72}
  .credit{font-size:10px;letter-spacing:.18em;color:var(--deep);opacity:.55;font-weight:500}
  .btn{font-family:"Noto Sans JP",sans-serif;font-weight:500;border:none;cursor:pointer;
    background:#fff;color:var(--deep);border-radius:12px;padding:7px 14px;font-size:13px;
    box-shadow:0 4px 0 #0a7e8e,0 6px 12px rgba(7,59,70,.25);transition:transform .06s}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #0a7e8e}

  /* tier ladder (collapsible legend) */
  .ladder{position:absolute;right:6px;bottom:44px;z-index:3;display:flex;flex-direction:column-reverse;
    gap:2px;pointer-events:none}
  .ladder .dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.8);opacity:.85;
    box-shadow:0 1px 2px rgba(0,0,0,.2)}

  /* overlays */
  .overlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;text-align:center;
    background:radial-gradient(circle at 50% 38%,rgba(10,126,142,.62),rgba(7,59,70,.86));
    backdrop-filter:blur(5px);opacity:0;visibility:hidden;transition:.28s;padding:24px}
  .overlay.show{opacity:1;visibility:visible}
  .overlay h2{font-family:"Noto Sans JP",sans-serif;font-weight:500;margin:0;color:#fff;font-size:clamp(30px,9vw,46px);
    text-shadow:0 3px 12px rgba(0,0,0,.35)}
  .overlay p{margin:0;color:var(--cream);font-weight:500}
  .overlay .big{font-family:"Noto Sans JP",sans-serif;font-weight:500;color:var(--gold);font-size:54px;line-height:1}
  .overlay .start-tip{color:#d8f6ec;font-size:13px;max-width:280px;line-height:1.6;opacity:.92}
  .overlay .btn{font-size:18px;padding:12px 30px}
  .mode-row{display:flex;gap:10px;width:100%;max-width:330px}
  .mode-btn{flex:1;font-family:"Noto Sans JP",sans-serif;font-weight:500;border:2px solid #fff;
    background:rgba(255,255,255,.88);color:var(--deep);border-radius:14px;padding:12px 8px;
    box-shadow:0 4px 0 #0a7e8e,0 6px 12px rgba(7,59,70,.25);cursor:pointer}
  .mode-btn b{display:block;font-size:15px;letter-spacing:.12em}
  .mode-btn small{display:block;margin-top:4px;font-size:10px;color:#0a7e8e}
  .mode-btn.easy{color:var(--coral)}
  .mode-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #0a7e8e}
  .btn.sub{font-size:13px;padding:8px 18px;background:rgba(255,255,255,.72);margin-top:-4px}
  .island{font-size:46px;filter:drop-shadow(0 6px 10px rgba(0,0,0,.4))}
  .quote{max-width:300px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.28);
    border-radius:16px;padding:15px 18px 17px}
  .quote .qlabel{font-size:10px;letter-spacing:.16em;color:var(--gold);font-weight:500;margin-bottom:9px}
  .quote .qmain{font-family:"Noto Sans JP",sans-serif;font-weight:500;color:#fff;font-size:clamp(17px,5.2vw,22px);line-height:1.4}
  .quote .qsub{margin-top:9px;font-size:12.5px;color:#dff7ee;line-height:1.65;font-weight:500}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="sun"></div>
<div class="clouds" id="clouds"></div>

<div class="wrap">
  <header>
    <div class="brand">
      <h1>沖縄UP！</h1>
      <div class="sub">OKINAWA MERGE</div>
    </div>
    <div class="hud-top">
      <div class="scores">
        <div class="chip"><div class="lab">Score</div><div class="val" id="score">0</div></div>
        <div class="chip best"><div class="lab">Best</div><div class="val" id="best">0</div></div>
      </div>
      <button id="mute" aria-label="音を切り替え">♪</button>
    </div>
  </header>

  <div class="stage">
    <div id="jar">
      <div class="hud">
        <div class="next">
          <div class="nimg"><img id="nextImg" alt=""></div>
          <div class="ntxt">NEXT<b id="nextName">—</b></div>
        </div>
        <div class="warn" id="warn">あふれそう！</div>
      </div>
      <div class="dangerline" id="dangerline"></div>
      <div class="ladder" id="ladder"></div>
      <canvas id="c"></canvas>

      <div class="overlay show" id="startOv">
        <div class="island">🏝️</div>
        <h2>沖縄UP！</h2>
        <p class="start-tip">同じものをぶつけて合体！<br>ハイビスカスから始まって、めざせ <b>石垣島</b>。<br>触れて狙い、はなして落とす。</p>
        <div class="mode-row">
          <button class="mode-btn" data-mode="normal"><b>NORMAL</b><small>いつもの沖縄UP</small></button>
          <button class="mode-btn easy" data-mode="easy"><b>EASY</b><small>ゆるやかに遊ぶ</small></button>
        </div>
      </div>

      <div class="overlay" id="overOv">
        <h2>おしまい</h2>
        <p>スコア</p>
        <div class="big" id="finalScore">0</div>
        <div class="quote">
          <div class="qlabel">黄金言葉（くがにくとぅば）</div>
          <div class="qmain" id="qMain"></div>
          <div class="qsub" id="qSub"></div>
        </div>
        <button class="btn" id="againBtn">もう一度</button>
        <button class="btn sub" id="topBtn">TOPへ</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="hint">― 触れて狙い、はなして落とす ―</div>
    <div class="credit">NANORUNAMONAI</div>
  </footer>
</div>

function resize(){
  const r = jar.getBoundingClientRect();
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = r.width; H = r.height;
  canvas.width = Math.round(W*DPR);
  canvas.height = Math.round(H*DPR);
  wallT = 4;
  topPad = Math.max(64, H*0.12);
  dropY = topPad*0.52;
  dangerY = Math.max(44, H*cfg().dangerRatio);
  dangerEl.style.top = dangerY+'px';
}
window.addEventListener('resize', ()=>{ resize(); rebuildWalls(); });

let walls=[];
function rebuildWalls(){
  if(!world) return;
  walls.forEach(w=>Composite.remove(world,w));
  const t=40;
  const floorY = H - FLOOR_PAD;
  walls = [
    Bodies.rectangle(W/2, floorY + t/2, W+200, t, {isStatic:true, friction:.6}),
    Bodies.rectangle(-t/2+wallT, H/2, t, H*2, {isStatic:true, friction:.2}),
    Bodies.rectangle(W+t/2-wallT, H/2, t, H*2, {isStatic:true, friction:.2}),
  ];
  Composite.add(world, walls);
}

function radiusOf(tier){ return TIERS[tier].r * W * cfg().size; }

function setupEngine(){
  engine = Engine.create();
  engine.gravity.y = cfg().gravity;
  world = engine.world;
  Events.on(engine, 'collisionStart', onCollision);
  rebuildWalls();
}

function newCurrent(){
  const tier = nextTier;
  nextTier = Math.floor(Math.random()*cfg().dropTiers);
  updateNext();
  const r = radiusOf(tier);
  const x = clampX(aimX*W, r);
  const b = Bodies.circle(x, dropY, r, {
    isStatic:true, restitution:0.15, friction:.4, frictionStatic:.6,
    label:'piece', render:{}
  });
  b.tier = tier; b.merged=false; b.held=true;
  Composite.add(world, b);
  current = b;
  canDrop = true;
}
function updateNext(){
  const t=TIERS[nextTier];
  nextImg.src=t.img; nextName.textContent=t.name;
}
function clampX(x,r){ return Math.max(wallT+r+2, Math.min(W-wallT-r-2, x)); }

/* sound: WebAudio only, no external files */
let AC=null, master=null, muted=false, lastWarnSound=0;
function audio(){
  if(!AC){ try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=.62; master.connect(AC.destination);
  }catch(e){ return null; } }
  return AC;
}
function unlockAudio(){ const a=audio(); if(a&&a.state==='suspended'){ try{ a.resume(); }catch(e){} } }
function env(t,v=.12,d=.32){
  const a=audio(); if(!a||muted)return null;
  const g=a.createGain(); g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(v,t+.014);
  g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  g.connect(master); return g;
}
function tone(f,t,d,type='sine',v=.1,bend=1){
  const a=audio(); if(!a||muted)return;
  const o=a.createOscillator(), g=env(t,v,d+.06); if(!g)return;
  o.type=type; o.frequency.setValueAtTime(f,t);
  if(bend!==1)o.frequency.exponentialRampToValueAtTime(f*bend,t+d);
  o.connect(g); o.start(t); o.stop(t+d+.08);
}
function noise(t,d,v=.045){
  const a=audio(); if(!a||muted)return;
  const len=Math.max(1,(a.sampleRate*d)|0), buf=a.createBuffer(1,len,a.sampleRate), data=buf.getChannelData(0);
  for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*(1-i/len);
  const src=a.createBufferSource(), f=a.createBiquadFilter(), g=env(t,v,d+.04); if(!g)return;
  f.type='bandpass'; f.frequency.value=1900; f.Q.value=1.2;
  src.buffer=buf; src.connect(f); f.connect(g); src.start(t); src.stop(t+d);
}
function sDrop(){ const a=audio(); if(!a||muted)return; const t=a.currentTime; tone(360,t,.14,'sine',.11,.76); noise(t+.02,.08,.055); }
function sMerge(tier){ const a=audio(); if(!a||muted)return; const t=a.currentTime, p=430+tier*34;
  tone(p,t,.18,'triangle',.13,1.32); tone(p*1.5,t+.035,.2,'sine',.078,1.14);
  if(tier>=5)tone(p*2,t+.085,.28,'sine',.06,1.08);
}
function sSpecial(){ const a=audio(); if(!a||muted)return; const t=a.currentTime;
  [520,660,780,1040].forEach((f,i)=>tone(f,t+i*.055,.22,'sine',.08,1.04));
}
function sWarn(level){ const a=audio(); if(!a||muted)return; const now=performance.now();
  if(now-lastWarnSound<900)return; lastWarnSound=now;
  tone(210+level*70,a.currentTime,.17,'triangle',.07,.82);
}
function sOver(){ const a=audio(); if(!a||muted)return; const t=a.currentTime;
  tone(300,t,.42,'sine',.15,.62); tone(190,t+.12,.46,'triangle',.11,.6); noise(t+.02,.22,.08);
}

function dropCurrent(){
  if(!current || !canDrop || !running) return;
  const b=current; canDrop=false; b.held=false; current=null;
  sDrop();
  Body.setStatic(b,false);
  Body.setVelocity(b,{x:0,y:0});
  Body.setAngle(b,0); Body.setAngularVelocity(b,0); Body.setInertia(b, Infinity);
  setTimeout(()=>{ if(running && !gameover) newCurrent(); }, cfg().cool);
}

/* aiming */
function pointerX(e){
  const r=jar.getBoundingClientRect();
  const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
  return Math.max(0,Math.min(1,cx/r.width));
}
function onMove(e){ if(!running)return; aimX=pointerX(e);
  if(current&&current.held){ const r=radiusOf(current.tier);
    Body.setPosition(current,{x:clampX(aimX*W,r),y:dropY}); } }
function onUp(e){ if(!running)return; dropCurrent(); }
jar.addEventListener('pointermove', onMove);
jar.addEventListener('pointerdown', e=>{ unlockAudio(); onMove(e); });
jar.addEventListener('pointerup', onUp);
jar.addEventListener('pointercancel', ()=>{});
let lastTouchEnd=0;
document.addEventListener('touchend',e=>{
  const now=Date.now();
  if(now-lastTouchEnd<320)e.preventDefault();
  lastTouchEnd=now;
},{passive:false});
document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});

/* merges */
function onCollision(ev){
  for(const p of ev.pairs){
    const a=p.bodyA, b=p.bodyB;
    if(a.label==='piece'&&b.label==='piece'&&!a.merged&&!b.merged
        &&a.tier===b.tier && a.tier<TIERS.length-1 && !a.held && !b.held){
      a.merged=b.merged=true;
      mergeQueue.push([a,b]);
    }
  }
}
function processMerges(){
  if(!mergeQueue.length) return;
  const q=mergeQueue; mergeQueue=[];
  for(const [a,b] of q){
    if(!a.position||!b.position) continue;
    const nt=a.tier+1;
    const x=(a.position.x+b.position.x)/2, y=(a.position.y+b.position.y)/2;
    Composite.remove(world,a); Composite.remove(world,b);
    const r=radiusOf(nt);
    const nb=Bodies.circle(x,y,r,{restitution:.18,friction:.4,frictionStatic:.6,label:'piece'});
    nb.tier=nt; nb.merged=false; nb.held=false;
    Body.setInertia(nb, Infinity);
    Composite.add(world,nb);
    Body.setVelocity(nb,{x:0,y:-1.5});
    sMerge(nt);
    burst(x,y,TIERS[nt].color, nt);
    addScore((nt+1)*1 + nt); // grows with tier
    if(nt===TIERS.length-1){ // reached 石垣島
      addScore(120);
      sSpecial();
      bigBurst(x,y);
    }
  }
}
function addScore(n){
  score+=n; scoreEl.textContent=score;
  if(score>best){ best=score; bestEl.textContent=best; saveBest(); }
}

/* particles */
function burst(x,y,color,tier){
  const n=8+tier;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=1.5+Math.random()*3.5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,color,sz:2+Math.random()*3});
  }
}
function bigBurst(x,y){
  for(let i=0;i<40;i++){
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*6;
    const cols=['#ffc24b','#e8443b','#16b6c9','#fff','#1fa86a'];
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1.4,
      color:cols[i%cols.length],sz:3+Math.random()*4});
  }
}

/* draw */
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  const bodies=Composite.allBodies(world);
  for(const b of bodies){
    if(b.label!=='piece') continue;
    const t=TIERS[b.tier]; const im=IMG[t.key];
    const r=b.circleRadius;
    ctx.save();
    ctx.translate(b.position.x,b.position.y);
    ctx.rotate(b.angle);
    if(im&&im.complete&&im.naturalWidth){
      const ar=im.naturalWidth/im.naturalHeight;
      let dw,dh; const fill=r*2*(t.drawScale||1.06);
      if(ar>=1){ dw=fill; dh=fill/ar; } else { dh=fill; dw=fill*ar; }
      ctx.shadowColor='rgba(7,59,70,0.22)';ctx.shadowBlur=r*0.14;ctx.shadowOffsetY=r*0.06;
      ctx.drawImage(im,-dw/2,-dh/2+r*(t.drawY||0),dw,dh);
    }
    ctx.restore();
    if(b.held){
      // aim guide
      ctx.save();ctx.setLineDash([4,7]);ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(b.position.x,b.position.y+r);ctx.lineTo(b.position.x,H-FLOOR_PAD);ctx.stroke();ctx.restore();
    }
  }
  // particles
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

/* danger check */
function checkDanger(dt){
  let danger=false;
  for(const b of Composite.allBodies(world)){
    if(b.label!=='piece'||b.held) continue;
    const speed=Math.hypot(b.velocity.x,b.velocity.y);
    if(b.position.y - b.circleRadius < dangerY && speed<0.9){ danger=true; break; }
  }
  if(danger){ dangerTimer+=dt; warnEl.classList.add('show'); dangerEl.classList.add('show'); sWarn(Math.min(1,dangerTimer/cfg().grace)); }
  else { dangerTimer=Math.max(0,dangerTimer-dt*1.15); warnEl.classList.remove('show'); dangerEl.classList.remove('show'); }
  if(dangerTimer>cfg().grace){ endGame(); }
}

let last=0;
function loop(ts){
  if(!last) last=ts; let dt=(ts-last)/1000; last=ts; if(dt>0.05)dt=0.05;
  if(running && !gameover){
    Engine.update(engine, 1000/60);
    processMerges();
    checkDanger(dt);
  }
  // particle update
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=dt*1.1; p.vx*=0.99; }
  particles=particles.filter(p=>p.life>0);
  draw();
  requestAnimationFrame(loop);
}

function startGame(selectedMode){
  if(selectedMode)mode=selectedMode;
  loadBest();
  if(engine)engine.gravity.y=cfg().gravity;
  resize();
  rebuildWalls();
  // clear
  if(world){ Composite.allBodies(world).forEach(b=>{ if(b.label==='piece')Composite.remove(world,b); }); }
  score=0; scoreEl.textContent=0; particles=[]; mergeQueue=[]; dangerTimer=0; gameover=false;
  warnEl.classList.remove('show'); dangerEl.classList.remove('show');
  nextTier=Math.floor(Math.random()*cfg().dropTiers);
  running=true;
  document.getElementById('startOv').classList.remove('show');
  document.getElementById('overOv').classList.remove('show');
  newCurrent();
}
const QUOTES=[
  {m:'なんくるないさ', s:'まくとぅそーけー なんくるないさ。正しい行いを尽くせば、いつかきっとうまくいく。'},
  {m:'いちゃりばちょーでー', s:'行逢りば兄弟。一度会えば、みな兄弟。'},
  {m:'ぬちどぅ宝', s:'命どぅ宝。命こそ、何よりの宝。'},
  {m:'ゆいまーる', s:'みんなで支え合い、助け合う心。'},
  {m:'てーげー', s:'根を詰めすぎず、ほどほどに大らかに。'},
  {m:'かーぎや皮どぅやる', s:'容姿は皮。肝心（ちむぐくる）こそ第一、中身が大事。'},
  {m:'片手さーねー 音ー出じらん', s:'片手では音は鳴らない。力を合わせてこそ事は成る。'},
  {m:'亀ぬ甲やか 年ぬ功', s:'亀の甲より年の功。重ねた経験は力になる。'},
  {m:'若さる時ぬ難儀ぇー 買てぃんしー', s:'若い時の苦労は、買ってでもせよ。'},
  {m:'やーなれー ふかなれー', s:'家での習慣は、外でもそのまま出るもの。'},
  {m:'人ぬ為ー 我が為ー', s:'人のためにすることは、巡って自分のためになる。'},
  {m:'ちむぐくる', s:'真心。心を込めて向き合う、沖縄のこころ。'},
];
function endGame(){
  if(gameover)return; gameover=true; running=false;
  sOver();
  if(current){ Composite.remove(world,current); current=null; }
  document.getElementById('finalScore').textContent=score;
  const q=QUOTES[Math.floor(Math.random()*QUOTES.length)];
  document.getElementById('qMain').textContent='「'+q.m+'」';
  document.getElementById('qSub').textContent=q.s;
  document.getElementById('overOv').classList.add('show');
}

function showStart(){
  running=false; gameover=false;
  if(current){ Composite.remove(world,current); current=null; }
  if(world){ Composite.allBodies(world).forEach(b=>{ if(b.label==='piece')Composite.remove(world,b); }); }
  particles=[]; mergeQueue=[]; dangerTimer=0; score=0; scoreEl.textContent=0; loadBest();
  warnEl.classList.remove('show'); dangerEl.classList.remove('show');
  document.getElementById('overOv').classList.remove('show');
  document.getElementById('startOv').classList.add('show');
}

document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{ unlockAudio(); startGame(btn.dataset.mode||'normal'); });
});
document.getElementById('againBtn').onclick=()=>{ unlockAudio(); startGame(); };
document.getElementById('topBtn').onclick=()=>{ unlockAudio(); showStart(); };
muteBtn.onclick=e=>{
  e.stopPropagation(); unlockAudio(); muted=!muted; muteBtn.textContent=muted?'×':'♪';
  if(!muted){ const a=audio(); if(a)tone(560,a.currentTime,.12,'sine',.08,1.2); }
};

/* boot */
function boot(){ resize(); setupEngine(); rebuildWalls(); requestAnimationFrame(loop); }
window.addEventListener('load', boot);
// also boot now in case load already fired
if(document.readyState==='complete'){ boot(); }
</script>
