<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON FUTSAL</title>
<style>
  :root{
    --bg:#070d18;
    --panel:#0d1b2e;
    --line:#3fe0d0;
    --blue:#33aaff;
    --red:#ff5560;
    --ink:#eaf6ff;
    --dim:#6f8aa6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:8px;padding:8px;}
  #hud{display:flex;align-items:center;gap:14px;font-variant-numeric:tabular-nums;
    letter-spacing:.05em;}
  .score{font-size:30px;font-weight:800;line-height:1;display:flex;align-items:baseline;gap:6px;}
  .score .b{color:var(--blue);text-shadow:0 0 14px rgba(51,170,255,.6);}
  .score .r{color:var(--red);text-shadow:0 0 14px rgba(255,85,96,.6);}
  .score .sep{color:var(--dim);font-size:18px;font-weight:600;}
  #clock{font-size:22px;font-weight:700;color:var(--ink);min-width:78px;text-align:center;
    background:var(--panel);border:1px solid #16314d;border-radius:10px;padding:4px 10px;}
  #stage{position:relative;width:100%;flex:1;display:flex;align-items:center;justify-content:center;}
  canvas{background:#0a1424;border-radius:14px;display:block;max-width:100%;max-height:100%;
    box-shadow:0 0 0 1px #16314d,0 18px 50px rgba(0,0,0,.6);}
  /* touch controls */
  #pad{position:absolute;left:14px;bottom:14px;width:118px;height:118px;border-radius:50%;
    background:radial-gradient(circle at 50% 50%,rgba(63,224,208,.12),rgba(13,27,46,.5));
    border:1px solid #1d3c5c;touch-action:none;}
  #stick{position:absolute;left:50%;top:50%;width:54px;height:54px;margin:-27px 0 0 -27px;
    border-radius:50%;background:radial-gradient(circle at 40% 35%,#5fd6ff,#1d7fd6);
    box-shadow:0 0 18px rgba(51,170,255,.7);}
  #shootBtn{position:absolute;right:18px;bottom:24px;width:96px;height:96px;border-radius:50%;
    border:1px solid #6b2630;color:#fff;font-weight:800;font-size:17px;letter-spacing:.06em;
    background:radial-gradient(circle at 40% 35%,#ff7a83,#d62633);
    box-shadow:0 0 22px rgba(255,85,96,.55);touch-action:none;}
  #shootBtn:active{transform:scale(.94);}
  .touchHide{display:none!important;}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;background:rgba(5,10,20,.78);backdrop-filter:blur(3px);
    border-radius:14px;text-align:center;padding:20px;}
  #overlay h1{margin:0;font-size:clamp(30px,7vw,52px);font-weight:900;letter-spacing:.04em;
    background:linear-gradient(90deg,var(--blue),var(--line),var(--red));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  #overlay p{margin:0;color:var(--dim);font-size:14px;max-width:340px;line-height:1.6;}
  #overlay .big{font-size:clamp(34px,9vw,64px);font-weight:900;}
  button.play{margin-top:4px;padding:14px 34px;font-size:18px;font-weight:800;letter-spacing:.05em;
    color:#04101e;border:none;border-radius:999px;cursor:pointer;
    background:linear-gradient(90deg,#3fe0d0,#33aaff);box-shadow:0 0 24px rgba(63,224,208,.5);}
  button.play:active{transform:translateY(1px);}
  .credit{position:absolute;right:12px;top:8px;font-size:10px;color:#34506e;letter-spacing:.18em;}
  .hidden{display:none!important;}
  @media (hover:hover) and (pointer:fine){ /* desktop hint handled in JS */ }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="score"><span class="b" id="sB">0</span><span class="sep">YOU</span></div>
    <div id="clock">2:00</div>
    <div class="score"><span class="sep">CPU</span><span class="r" id="sR">0</span></div>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="credit">NANORUNAMONAI</div>
    <div id="pad"><div id="stick"></div></div>
    <button id="shootBtn">SHOOT</button>
    <div id="overlay">
      <h1 id="ovTitle">NEON FUTSAL</h1>
      <p id="ovText"></p>
      <button class="play" id="playBtn">KICK OFF</button>
    </div>
  </div>
</div>

<script>
"use strict";
(function(){
  // ---------- field (logical coords) ----------
  const FW = 920, FH = 560;          // play field inside walls
  const WALL = 16;                    // wall thickness
  const GOAL_H = 176;                 // goal opening height
  const TOTAL_W = FW, TOTAL_H = FH;
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  cv.width = TOTAL_W; cv.height = TOTAL_H;

  // ---------- audio ----------
  let AC=null;
  function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
  function beep(freq,dur,type,vol,slideTo){
    const a=ac(); if(!a) return;
    const o=a.createOscillator(), g=a.createGain();
    o.type=type||'square'; o.frequency.value=freq;
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, a.currentTime+dur);
    g.gain.value=vol||0.06;
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+dur);
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime+dur);
  }
  const sfx = {
    kick(){ beep(150,0.07,'square',0.07,90); },
    shoot(){ beep(260,0.12,'sawtooth',0.08,120); },
    wall(){ beep(120,0.05,'triangle',0.05); },
    goal(){ beep(440,0.12,'square',0.09,660); setTimeout(()=>beep(660,0.14,'square',0.09,880),110); setTimeout(()=>beep(880,0.2,'square',0.09,1100),240); },
    whistle(){ beep(1600,0.18,'sine',0.05,2000); }
  };

  // ---------- entities ----------
  const PR = 17;      // player radius
  const BR = 9;       // ball radius
  const PSPEED = 3.5; // human max speed
  const AISPEED = 3.1;
  const FRICTION = 0.985;

  function mk(x,y,team,role){ return {x,y,vx:0,vy:0,team,role,dirx:team==='blue'?1:-1,diry:0,cool:0}; }
  let players=[], ball={x:0,y:0,vx:0,vy:0,owner:null};

  // blue attacks right (+x), red attacks left (-x)
  function layout(){
    players = [
      mk(WALL+70, FH/2, 'blue','gk'),
      mk(FW*0.30, FH*0.30, 'blue','field'),
      mk(FW*0.30, FH*0.70, 'blue','field'),
      mk(FW-WALL-70, FH/2, 'red','gk'),
      mk(FW*0.70, FH*0.30, 'red','field'),
      mk(FW*0.70, FH*0.70, 'red','field'),
    ];
  }
  function kickoff(dir){
    layout();
    ball.x=FW/2; ball.y=FH/2; ball.vx=0; ball.vy=0; ball.owner=null;
  }

  // ---------- state ----------
  let scoreB=0, scoreR=0;
  let timeLeft=120;            // seconds
  let running=false, paused=true, goalFreeze=0, gameOver=false;
  const sB=document.getElementById('sB'), sR=document.getElementById('sR'), clk=document.getElementById('clock');
  const overlay=document.getElementById('overlay'), ovTitle=document.getElementById('ovTitle'),
        ovText=document.getElementById('ovText'), playBtn=document.getElementById('playBtn');

  function fmt(t){ t=Math.max(0,Math.ceil(t)); const m=(t/60)|0, s=t%60; return m+':'+(s<10?'0':'')+s; }

  // ---------- input ----------
  const keys={};
  let inDir={x:0,y:0};        // unified move vector (-1..1)
  let shootQueued=false;

  window.addEventListener('keydown',e=>{
    const k=e.key.toLowerCase();
    if(['arrowup','arrowdown','arrowleft','arrowright',' ','w','a','s','d'].includes(k)) e.preventDefault();
    keys[k]=true;
    if(k===' ') shootQueued=true;
  },{passive:false});
  window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

  function keyVec(){
    let x=0,y=0;
    if(keys['arrowleft']||keys['a']) x-=1;
    if(keys['arrowright']||keys['d']) x+=1;
    if(keys['arrowup']||keys['w']) y-=1;
    if(keys['arrowdown']||keys['s']) y+=1;
    return {x,y};
  }

  // touch pad
  const pad=document.getElementById('pad'), stick=document.getElementById('stick'),
        shootBtn=document.getElementById('shootBtn');
  let padId=null, padCx=0, padCy=0, touchDir={x:0,y:0};
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints>0;
  if(!isTouch){ pad.classList.add('touchHide'); shootBtn.classList.add('touchHide'); }

  function padStart(e){ const t=e.changedTouches?e.changedTouches[0]:e; padId=t.identifier??'mouse';
    const r=pad.getBoundingClientRect(); padCx=r.left+r.width/2; padCy=r.top+r.height/2; padMove(e); }
  function padMove(e){
    let t=null;
    if(e.changedTouches){ for(const c of e.changedTouches) if(c.identifier===padId) t=c; }
    else t=e;
    if(!t) return;
    let dx=t.clientX-padCx, dy=t.clientY-padCy;
    const mag=Math.hypot(dx,dy), max=44;
    if(mag>max){ dx=dx/mag*max; dy=dy/mag*max; }
    stick.style.transform=`translate(${dx}px,${dy}px)`;
    touchDir={x:dx/max,y:dy/max};
  }
  function padEnd(){ padId=null; touchDir={x:0,y:0}; stick.style.transform='translate(0,0)'; }
  pad.addEventListener('touchstart',e=>{e.preventDefault();padStart(e);},{passive:false});
  pad.addEventListener('touchmove',e=>{e.preventDefault();padMove(e);},{passive:false});
  pad.addEventListener('touchend',e=>{e.preventDefault();padEnd();},{passive:false});
  shootBtn.addEventListener('touchstart',e=>{e.preventDefault();shootQueued=true;ac();},{passive:false});
  shootBtn.addEventListener('click',e=>{shootQueued=true;});

  // ---------- helpers ----------
  function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }
  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
  function norm(x,y){ const m=Math.hypot(x,y)||1; return {x:x/m,y:y/m}; }

  // pick human-controlled blue field player = closest blue field to ball
  function humanPlayer(){
    let best=null,bd=1e9;
    for(const p of players){ if(p.team==='blue'&&p.role==='field'){ const d=dist(p,ball); if(d<bd){bd=d;best=p;} } }
    return best;
  }

  // ---------- update ----------
  function step(){
    if(goalFreeze>0){ goalFreeze--; if(goalFreeze===0 && !gameOver){ /* resume */ } drawAll(); return; }
    if(paused){ drawAll(); return; }

    // timer
    timeLeft -= 1/60;
    clk.textContent = fmt(timeLeft);
    if(timeLeft<=0 && !gameOver){ endGame(); }

    const human = humanPlayer();

    // unified input
    const kv=keyVec();
    inDir.x = touchDir.x || kv.x;
    inDir.y = touchDir.y || kv.y;

    for(const p of players){
      if(p.cool>0) p.cool--;
      if(p===human){
        controlHuman(p);
      } else {
        controlAI(p);
      }
    }
    // shoot for human
    if(shootQueued){ doShoot(human); shootQueued=false; }

    integratePlayers();
    integrateBall();
    drawAll();
  }

  function controlHuman(p){
    let v=norm(inDir.x,inDir.y);
    const mag=Math.hypot(inDir.x,inDir.y);
    if(mag>0.12){
      p.vx += (v.x*PSPEED - p.vx)*0.35;
      p.vy += (v.y*PSPEED - p.vy)*0.35;
      p.dirx=v.x; p.diry=v.y;
    } else {
      p.vx*=0.7; p.vy*=0.7;
    }
  }

  function attackGoalX(team){ return team==='blue'? FW-WALL : WALL; }
  function ownGoalX(team){ return team==='blue'? WALL : FW-WALL; }

  function controlAI(p){
    const team=p.team;
    const gx=attackGoalX(team);
    if(p.role==='gk'){
      // stay on own goal line, track ball y within goal span
      const lineX = team==='blue'? WALL+46 : FW-WALL-46;
      const gy = clamp(ball.y, FH/2-GOAL_H/2+10, FH/2+GOAL_H/2-10);
      p.vx += (lineX - p.x)*0.06 - p.vx*0.3;
      p.vy += (gy - p.y)*0.10 - p.vy*0.3;
      // clear if ball close
      if(dist(p,ball)<PR+BR+6){ clearBall(p); }
      return;
    }
    // field AI: closest team field player chases; other holds forward position
    let closest=null,cd=1e9;
    for(const q of players){ if(q.team===team&&q.role==='field'){ const d=dist(q,ball); if(d<cd){cd=d;closest=q;} } }
    let tx,ty;
    if(p===closest){
      tx=ball.x; ty=ball.y;
      // if has ball, steer toward goal
      if(dist(p,ball)<PR+BR+8){
        const dirToGoal=norm(gx-p.x, (FH/2)-p.y);
        tx=p.x+dirToGoal.x*60; ty=p.y+dirToGoal.y*60;
        // shoot when near attack goal
        const near = team==='blue'? (p.x>FW*0.62) : (p.x<FW*0.38);
        if(near && p.cool<=0 && Math.random()<0.05){ doShoot(p); }
      }
    } else {
      // support: positioned between ball and attack goal, on opposite vertical half
      tx = (ball.x + gx)/2;
      ty = ball.y>FH/2 ? FH*0.35 : FH*0.65;
    }
    const v=norm(tx-p.x, ty-p.y);
    const sp = AISPEED * (p===closest?1:0.8);
    p.vx += (v.x*sp - p.vx)*0.18;
    p.vy += (v.y*sp - p.vy)*0.18;
  }

  function doShoot(p){
    if(!p) return;
    if(dist(p,ball)>PR+BR+14) { sfx.kick(); return; } // swing & miss-ish
    let d=norm(p.dirx,p.diry);
    if(Math.hypot(p.dirx,p.diry)<0.1){ d=norm(attackGoalX(p.team)-p.x,(FH/2)-p.y); }
    const POW=13.5;
    ball.vx = d.x*POW; ball.vy = d.y*POW;
    p.cool=18;
    sfx.shoot();
  }
  function clearBall(p){
    const d=norm(attackGoalX(p.team)-p.x, (Math.random()-0.5)*FH);
    ball.vx=d.x*11; ball.vy=d.y*7;
    p.cool=20; sfx.kick();
  }

  function integratePlayers(){
    for(const p of players){
      const max = p.role==='gk'?2.6:(p===humanPlayer()?PSPEED:AISPEED);
      const sp=Math.hypot(p.vx,p.vy);
      if(sp>max){ p.vx=p.vx/sp*max; p.vy=p.vy/sp*max; }
      p.x+=p.vx; p.y+=p.vy;
      // keep inside walls
      p.x=clamp(p.x,WALL+PR,FW-WALL-PR);
      p.y=clamp(p.y,WALL+PR,FH-WALL-PR);
    }
    // player-player soft separation
    for(let i=0;i<players.length;i++)for(let j=i+1;j<players.length;j++){
      const a=players[i],b=players[j]; let dx=b.x-a.x,dy=b.y-a.y; let d=Math.hypot(dx,dy);
      const min=PR*2-2;
      if(d<min && d>0){ const o=(min-d)/2; dx/=d;dy/=d; a.x-=dx*o;a.y-=dy*o;b.x+=dx*o;b.y+=dy*o; }
    }
    // dribble: contact pushes ball
    for(const p of players){
      let dx=ball.x-p.x, dy=ball.y-p.y, d=Math.hypot(dx,dy);
      const min=PR+BR;
      if(d<min && d>0){
        dx/=d;dy/=d;
        // separate
        ball.x=p.x+dx*min; ball.y=p.y+dy*min;
        // impart push in player heading + outward
        const pv=Math.hypot(p.vx,p.vy);
        const push = pv*0.9 + 1.2;
        ball.vx = dx*push + p.vx*0.5;
        ball.vy = dy*push + p.vy*0.5;
      }
    }
  }

  function integrateBall(){
    ball.x+=ball.vx; ball.y+=ball.vy;
    ball.vx*=FRICTION; ball.vy*=FRICTION;
    if(Math.abs(ball.vx)<0.02)ball.vx=0;
    if(Math.abs(ball.vy)<0.02)ball.vy=0;

    const inGoalY = ball.y>FH/2-GOAL_H/2 && ball.y<FH/2+GOAL_H/2;
    // left goal is blue's own net -> red scores there; right goal -> blue scores
    if(ball.x-BR<WALL){
      if(inGoalY){ score('red'); return; }
      ball.x=WALL+BR; ball.vx=Math.abs(ball.vx)*0.8; sfx.wall();
    }
    if(ball.x+BR>FW-WALL){
      if(inGoalY){ score('blue'); return; }
      ball.x=FW-WALL-BR; ball.vx=-Math.abs(ball.vx)*0.8; sfx.wall();
    }
    if(ball.y-BR<WALL){ ball.y=WALL+BR; ball.vy=Math.abs(ball.vy)*0.8; sfx.wall(); }
    if(ball.y+BR>FH-WALL){ ball.y=FH-WALL-BR; ball.vy=-Math.abs(ball.vy)*0.8; sfx.wall(); }
  }

  function score(team){
    if(team==='blue'){ scoreB++; sB.textContent=scoreB; } else { scoreR++; sR.textContent=scoreR; }
    sfx.goal();
    goalFreeze=70; paused=true;
    flashTeam=team; flashT=70;
    setTimeout(()=>{ kickoff(); paused=false; flashT=0; }, 1150);
  }

  let flashTeam=null, flashT=0;

  function endGame(){
    gameOver=true; paused=true; running=false; sfx.whistle();
    let msg;
    if(scoreB>scoreR) msg='YOU WIN';
    else if(scoreB<scoreR) msg='YOU LOSE';
    else msg='DRAW';
    ovTitle.innerHTML=`<span class="big">${msg}</span>`;
    ovText.textContent=`${scoreB} - ${scoreR}　もう一度プレイできます。`;
    playBtn.textContent='もう一度';
    overlay.classList.remove('hidden');
  }

  // ---------- render ----------
  function rr(x,y,w,h,r){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); }
  function drawAll(){
    ctx.clearRect(0,0,FW,FH);
    // floor
    ctx.fillStyle='#0a1424'; ctx.fillRect(0,0,FW,FH);
    // subtle floor glow stripes
    ctx.save();
    for(let i=0;i<6;i++){ ctx.fillStyle=i%2?'rgba(255,255,255,.012)':'rgba(255,255,255,.025)';
      ctx.fillRect(WALL+i*(FW-2*WALL)/6, WALL, (FW-2*WALL)/6, FH-2*WALL); }
    ctx.restore();

    // lines
    ctx.strokeStyle='rgba(63,224,208,.55)'; ctx.lineWidth=2.5;
    ctx.shadowColor='rgba(63,224,208,.5)'; ctx.shadowBlur=8;
    ctx.strokeRect(WALL,WALL,FW-2*WALL,FH-2*WALL);
    // center line + circle
    ctx.beginPath(); ctx.moveTo(FW/2,WALL); ctx.lineTo(FW/2,FH-WALL); ctx.stroke();
    ctx.beginPath(); ctx.arc(FW/2,FH/2,62,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(FW/2,FH/2,4,0,Math.PI*2); ctx.fillStyle='rgba(63,224,208,.7)'; ctx.fill();
    // penalty arcs
    ctx.beginPath(); ctx.arc(WALL,FH/2,108,-Math.PI/2.4,Math.PI/2.4); ctx.stroke();
    ctx.beginPath(); ctx.arc(FW-WALL,FH/2,108,Math.PI-Math.PI/2.4,Math.PI+Math.PI/2.4); ctx.stroke();
    ctx.shadowBlur=0;

    // goals
    drawGoal(WALL, '#33aaff');
    drawGoal(FW-WALL, '#ff5560', true);

    // ball shadow
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.beginPath(); ctx.ellipse(ball.x,ball.y+8,BR,BR*0.55,0,0,Math.PI*2); ctx.fill();

    // players
    const human=humanPlayer();
    for(const p of players){
      const col=p.team==='blue'?'#33aaff':'#ff5560';
      // shadow
      ctx.fillStyle='rgba(0,0,0,.3)';
      ctx.beginPath(); ctx.ellipse(p.x,p.y+10,PR*0.9,PR*0.5,0,0,Math.PI*2); ctx.fill();
      // body
      ctx.beginPath(); ctx.arc(p.x,p.y,PR,0,Math.PI*2);
      ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=p===human?22:8; ctx.fill();
      ctx.shadowBlur=0;
      if(p.role==='gk'){ ctx.lineWidth=3; ctx.strokeStyle='#eaf6ff'; ctx.stroke(); }
      // human marker
      if(p===human){
        ctx.strokeStyle='#fff'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.arc(p.x,p.y,PR+5,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(p.x,p.y-PR-12); ctx.lineTo(p.x-6,p.y-PR-3); ctx.lineTo(p.x+6,p.y-PR-3); ctx.closePath();
        ctx.fillStyle='#fff'; ctx.fill();
      }
    }

    // ball
    ctx.beginPath(); ctx.arc(ball.x,ball.y,BR,0,Math.PI*2);
    ctx.fillStyle='#ffffff'; ctx.shadowColor='rgba(255,255,255,.8)'; ctx.shadowBlur=12; ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(ball.x,ball.y,BR,0,Math.PI*2); ctx.stroke();

    // goal flash
    if(flashT>0){
      flashT--;
      const a=flashT/70;
      ctx.fillStyle=`rgba(${flashTeam==='blue'?'51,170,255':'255,85,96'},${a*0.25})`;
      ctx.fillRect(0,0,FW,FH);
      ctx.fillStyle=`rgba(255,255,255,${a})`;
      ctx.font='900 64px -apple-system,sans-serif'; ctx.textAlign='center';
      ctx.fillText('GOAL!',FW/2,FH/2+22);
      ctx.textAlign='left';
    }
  }
  function drawGoal(x,col,right){
    const top=FH/2-GOAL_H/2, bot=FH/2+GOAL_H/2;
    ctx.strokeStyle=col; ctx.lineWidth=6; ctx.shadowColor=col; ctx.shadowBlur=16;
    ctx.beginPath();
    const d=right?-12:12;
    ctx.moveTo(x,top); ctx.lineTo(x+d,top); ctx.moveTo(x,bot); ctx.lineTo(x+d,bot);
    ctx.moveTo(x,top); ctx.lineTo(x,bot);
    ctx.stroke();
    // net hint
    ctx.strokeStyle=col; ctx.globalAlpha=0.25; ctx.lineWidth=1;
    for(let yy=top;yy<=bot;yy+=10){ ctx.beginPath(); ctx.moveTo(x,yy); ctx.lineTo(x+d,yy); ctx.stroke(); }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  // ---------- loop ----------
  function loop(){ step(); requestAnimationFrame(loop); }

  // ---------- start ----------
  function startGame(){
    ac();
    scoreB=0; scoreR=0; sB.textContent='0'; sR.textContent='0';
    timeLeft=120; gameOver=false; flashT=0; goalFreeze=0;
    kickoff();
    overlay.classList.add('hidden');
    paused=false; running=true;
    sfx.whistle();
  }
  playBtn.addEventListener('click',startGame);

  // intro text
  ovText.innerHTML = (isTouch
    ? '左スティックで移動、SHOOTで蹴る。<br>ボールに一番近い味方を自動で操作します。'
    : 'WASD / 矢印キーで移動、スペースでシュート。<br>ボールに一番近い味方を自動で操作します。')
    + '<br>2分間で多く決めた方が勝ち。';

  layout(); kickoff(); drawAll();
  loop();
})();
</script>
</body>
</html>
