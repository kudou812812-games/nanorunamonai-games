<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ことばあつめ — Kotoba Atsume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+Devanagari:wght@400;600&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF7EC; --paper2:#FFE9CE; --card:#FFFFFF;
    --ink:#2B2440; --muted:#857D9B; --line:#ECE2D2;
    --accent:#E8743B; --accent-d:#C95A26;
    --blue:#2A6FB0; --red:#D7443E; --green:#2E9E6B; --yellow:#EAB308; --whiteb:#FBFBFD;
    --jp:"Kosugi Maru","Hiragino Maru Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;
    --ne:"Noto Sans Devanagari",sans-serif;
    --en:"Nunito",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--jp); color:var(--ink);
    background:linear-gradient(170deg,#FFF7EC 0%,#FFE9CE 55%,#FFD9C2 100%);
    overflow:hidden; position:fixed; inset:0; display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .screen{flex:1; display:none; flex-direction:column; min-height:0}
  .screen.on{display:flex}

  /* ---------- TITLE ---------- */
  #title{justify-content:center; align-items:center; text-align:center; padding:24px; gap:4px}
  #title .brand{font-family:var(--en); font-size:12px; letter-spacing:3px; color:var(--accent-d); font-weight:800}
  #title h1{font-family:var(--jp); font-size:clamp(34px,11vw,54px); color:var(--ink); line-height:1.05; margin-top:2px}
  #title .sub{color:var(--muted); font-size:13px; margin-bottom:20px}
  #title .sub .en{font-family:var(--en)} #title .sub .ne{font-family:var(--ne)}
  .modes{display:flex; flex-direction:column; gap:14px; width:100%; max-width:420px}
  .mode{display:flex; align-items:center; gap:14px; text-align:left; cursor:pointer; border:none;
    background:var(--card); border:1px solid var(--line); border-radius:20px; padding:14px 16px;
    box-shadow:0 8px 24px rgba(120,80,40,.10); transition:transform .07s; width:100%;}
  .mode:active{transform:scale(.98)}
  .btn{font-family:var(--jp); font-weight:bold; border:none; cursor:pointer;
    background:var(--accent); color:#fff; border-radius:999px; padding:16px 48px; font-size:22px;
    box-shadow:0 8px 0 var(--accent-d); transition:transform .06s, box-shadow .06s; margin-top:18px}
  .btn:active{transform:translateY(5px); box-shadow:0 3px 0 var(--accent-d)}
  .btn .small{display:block; font-family:var(--en); font-weight:600; font-size:11px; opacity:.85; margin-top:2px}
  .mode .big{font-size:34px; flex:0 0 auto}
  .mode .t1{font-family:var(--jp); font-size:21px; font-weight:bold}
  .mode .lvl{font-family:var(--en); font-size:11px; font-weight:800; color:#fff; padding:2px 8px; border-radius:6px; margin-left:8px; vertical-align:middle}
  .mode .lvl.easy{background:var(--green)} .mode .lvl.hard{background:var(--red)}
  .mode .t2{font-size:12px; color:var(--muted); margin-top:3px}
  .mode .t2 .en{font-family:var(--en)} .mode .t2 .ne{font-family:var(--ne)}

  /* ---------- GAME ---------- */
  #game{padding:8px 12px 12px}
  .topbar{display:flex; align-items:center; gap:8px; margin-bottom:6px}
  .iconbtn{flex:0 0 auto; height:38px; min-width:38px; padding:0 10px; border-radius:12px; border:1px solid var(--line);
    background:var(--card); font-size:16px; cursor:pointer; color:var(--ink); font-family:var(--en); font-weight:800}
  .progress{flex:1; text-align:center; font-family:var(--en); font-size:13px; color:var(--muted); font-weight:800}

  .panel{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:12px 12px 10px;
    box-shadow:0 6px 18px rgba(120,80,40,.08); margin-bottom:6px}
  /* word slots */
  .slots{display:flex; gap:8px; justify-content:center; flex-wrap:wrap}
  .slot{width:46px; height:54px; border-radius:12px; border:2px dashed #D8C7AE; background:rgba(255,255,255,.6);
    display:flex; align-items:center; justify-content:center; font-size:28px; color:#C9B89C;
    transition:transform .15s, background .2s, color .2s, border-color .2s}
  .slot.guide{color:#C9B89C}      /* word mode: faint guide char */
  .slot.blank{color:transparent}  /* sentence mode: hidden until filled */
  .slot.done{background:var(--ink); color:#fff!important; border:2px solid var(--ink); transform:scale(1.04)}
  /* sentence line */
  .sline{display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:center; gap:1px 0; font-size:24px; line-height:1.7}
  .cell{font-family:var(--jp)}
  .cell.punc{color:var(--muted)}
  .cell.hint{color:var(--accent-d); font-weight:bold; border-bottom:2px solid #F2C9A8; padding:0 1px}
  .bslot{display:inline-flex; align-items:center; justify-content:center; min-width:30px; height:38px; margin:0 2px;
    border-bottom:3px solid var(--accent); color:#CDBDA2; font-size:24px; vertical-align:bottom; transition:color .2s, background .2s}
  .bslot.done{color:#fff; background:var(--ink); border-radius:8px; border-bottom:3px solid var(--ink)}

  .hint{text-align:center; font-size:13px; padding:6px 4px 0; min-height:8px}
  .hint.hidden{visibility:hidden}
  .hint .en{font-family:var(--en); font-weight:800; color:var(--ink)}
  .hint .ne{font-family:var(--ne); color:var(--accent-d)}
  .hint .rj{font-family:var(--en); font-weight:800; color:var(--muted); letter-spacing:1px}

  #field{position:relative; flex:1; min-height:0; overflow:hidden; border-radius:20px;
    background:radial-gradient(120% 90% at 50% 0%, rgba(255,255,255,.5), rgba(255,255,255,0)); border:1px solid rgba(255,255,255,.6)}
  .bubble{position:absolute; top:0; left:0; width:64px; height:64px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:bold; font-family:var(--jp);
    cursor:pointer; will-change:transform; user-select:none;
    box-shadow:0 6px 14px rgba(0,0,0,.18), inset 0 -4px 8px rgba(0,0,0,.12); border:2px solid rgba(255,255,255,.5)}
  .bubble.pop{animation:pop .26s ease forwards}
  .bubble.shake{animation:shake .3s ease}
  @keyframes pop{to{transform:translate3d(var(--x),var(--y),0) scale(0); opacity:0}}
  @keyframes shake{10%,90%{transform:translate3d(calc(var(--x) - 4px),var(--y),0)}30%,70%{transform:translate3d(calc(var(--x) + 6px),var(--y),0)}50%{transform:translate3d(calc(var(--x) - 6px),var(--y),0)}}
  .footer{text-align:center; font-family:var(--en); font-size:9px; letter-spacing:2px; color:var(--muted); padding-top:6px; opacity:.7}

  /* ---------- ANSWER ---------- */
  #answer{position:absolute; inset:0; display:none; z-index:20; align-items:center; justify-content:center;
    background:rgba(43,36,64,.45); backdrop-filter:blur(3px); padding:14px}
  #answer.on{display:flex; animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .acard{background:var(--card); border-radius:24px; width:100%; max-width:480px; max-height:92vh;
    overflow-y:auto; -webkit-overflow-scrolling:touch; box-shadow:0 24px 60px rgba(0,0,0,.3); animation:rise .3s ease}
  @keyframes rise{from{transform:translateY(24px)}to{transform:translateY(0)}}
  .ahead{padding:22px 22px 16px; text-align:center; background:linear-gradient(160deg,#FFF1E2,#FFE4CE); border-radius:24px 24px 0 0}
  .emoji{font-size:44px; line-height:1}
  .kanji{font-family:var(--jp); font-weight:bold; margin:6px 0 4px}
  .kanji.word{font-size:46px} .kanji.sent{font-size:26px; line-height:1.9}
  .kanji ruby rt{font-size:.42em; color:var(--accent-d); font-weight:bold}
  .speak{width:44px; height:44px; border-radius:50%; border:none; background:var(--accent); color:#fff;
    font-size:21px; cursor:pointer; box-shadow:0 4px 0 var(--accent-d); margin-top:6px}
  .speak:active{transform:translateY(3px); box-shadow:0 1px 0 var(--accent-d)}
  .romaji{font-family:var(--en); color:var(--muted); font-weight:700; letter-spacing:1px; font-size:14px; margin-top:8px}
  .means{padding:14px 20px 4px; display:flex; flex-direction:column; gap:8px}
  .mrow{display:flex; align-items:baseline; gap:10px}
  .tag{flex:0 0 auto; font-family:var(--en); font-size:10px; font-weight:800; letter-spacing:.5px; padding:3px 7px; border-radius:6px; color:#fff}
  .tag.en{background:var(--blue)} .tag.ne{background:var(--green)}
  .mrow .v{font-size:16px} .mrow.en .v{font-family:var(--en); font-weight:700} .mrow.ne .v{font-family:var(--ne)}
  .note{margin:12px 20px 2px; padding:11px 14px; border-radius:14px; background:#FFF6E8; border:1px solid #F3E2C4}
  .note .lb{font-family:var(--en); font-size:10px; font-weight:800; letter-spacing:1px; color:var(--accent-d)}
  .note .jp{font-family:var(--jp); font-size:14px; margin-top:3px; line-height:1.6}
  .note .jp ruby rt{font-size:.45em; color:var(--accent-d)}
  .note .sm{font-size:12px; margin-top:4px; color:var(--muted)}
  .note .sm .en{font-family:var(--en); font-weight:600} .note .sm .ne{font-family:var(--ne)}

  .exhead{padding:14px 20px 2px; font-size:12px; color:var(--muted); font-family:var(--en); font-weight:800; letter-spacing:1px}
  .ex{margin:6px 20px; padding:12px 14px; border:1px solid var(--line); border-radius:14px; background:#FFFCF7}
  .ex .jp{font-family:var(--jp); font-size:18px; line-height:1.9; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .ex .jp ruby rt{font-size:.42em; color:var(--accent-d)}
  .ex .en{font-family:var(--en); color:var(--muted); font-size:13px; margin-top:4px; font-weight:600}
  .ex .ne{font-family:var(--ne); color:var(--green); font-size:13px; margin-top:1px}
  .mini{width:30px; height:30px; flex:0 0 auto; border-radius:50%; border:1px solid var(--line); background:#fff; cursor:pointer; font-size:15px}
  .turn{margin:6px 20px; display:flex; gap:8px; align-items:flex-start}
  .who{flex:0 0 auto; width:26px; height:26px; border-radius:50%; color:#fff; font-family:var(--en); font-weight:800;
    font-size:13px; display:flex; align-items:center; justify-content:center; margin-top:4px}
  .who.a{background:var(--blue)} .who.b{background:var(--accent)}
  .bub{flex:1; background:#FFFCF7; border:1px solid var(--line); border-radius:14px; padding:10px 12px}
  .bub .jp{font-family:var(--jp); font-size:17px; line-height:1.8; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .bub .jp ruby rt{font-size:.42em; color:var(--accent-d)}
  .bub .en{font-family:var(--en); color:var(--muted); font-size:12.5px; margin-top:3px; font-weight:600}
  .bub .ne{font-family:var(--ne); color:var(--green); font-size:12.5px; margin-top:1px}

  .afoot{padding:16px 20px 22px; text-align:center}
  .next{font-family:var(--jp); font-weight:bold; border:none; cursor:pointer; background:var(--ink); color:#fff;
    border-radius:999px; padding:14px 46px; font-size:18px; box-shadow:0 6px 0 #1b1630}
  .next:active{transform:translateY(4px); box-shadow:0 2px 0 #1b1630}
  .next .small{display:block; font-family:var(--en); font-weight:600; font-size:10px; opacity:.8}
</style>
</head>
<body>

<!-- TITLE -->
<section id="title" class="screen on">
  <div class="brand">NANORUNAMONAI</div>
  <h1>ことば<br>あつめ</h1>
  <div class="sub">にほんごを あそびながら · <span class="en">Learn Japanese by playing</span> · <span class="ne">खेल्दै सिक्नुहोस्</span></div>
  <div class="modes">
    <button class="mode" data-mode="word">
      <div class="big">🫧</div>
      <div>
        <div class="t1">ことば <span class="lvl easy">28問</span></div>
        <div class="t2"><span class="en">Collect single words</span> · <span class="ne">शब्द संकलन</span></div>
      </div>
    </button>
    <button class="mode" data-mode="sent">
      <div class="big">📝</div>
      <div>
        <div class="t1">ぶんしょう <span class="lvl hard">25問</span></div>
        <div class="t2"><span class="en">Fill-in-the-blank sentences</span> · <span class="ne">वाक्य भर्नुहोस्</span></div>
      </div>
    </button>
  </div>
</section>

<!-- GAME -->
<section id="game" class="screen">
  <div class="topbar">
    <button class="iconbtn" id="homeBtn" title="home">🏠</button>
    <div class="progress" id="prog">1 / 14</div>
    <button class="iconbtn" id="hintBtn" title="hint">💡</button>
    <button class="iconbtn" id="speedBtn" title="speed">×1.5</button>
  </div>
  <div class="panel">
    <div id="board"></div>
    <div class="hint hidden" id="hint"></div>
  </div>
  <div id="field"></div>
  <div class="footer">NANORUNAMONAI</div>
</section>

<!-- ANSWER OVERLAY -->
<div id="answer">
  <div class="acard">
    <div id="aBody"></div>
    <div class="afoot"><button class="next" id="nextBtn">つぎ<span class="small">NEXT · अर्को</span></button></div>
  </div>
</div>

<script>
/* ============================================================
   WORDS (EASY) — ネパール語はベスト・エフォート。奥様と直してOK。
   ============================================================ */
const WORDS = [
  { hira:"あう", emoji:"🤝", romaji:"au", en:"to meet", ne:"भेट्नु", kanji:"<ruby>会<rt>あ</rt></ruby>う",
    ex:[{jp:"<ruby>人<rt>ひと</rt></ruby>と<ruby>会<rt>あ</rt></ruby>う",say:"人と会う",en:"to meet a person",ne:"मान्छेसँग भेट्नु"},
        {jp:"<ruby>友達<rt>ともだち</rt></ruby>と<ruby>会<rt>あ</rt></ruby>う",say:"友達と会う",en:"to meet a friend",ne:"साथीसँग भेट्नु"}]},
  { hira:"あめ", emoji:"🌧️", romaji:"ame", en:"rain", ne:"पानी / वर्षा", kanji:"<ruby>雨<rt>あめ</rt></ruby>",
    ex:[{jp:"<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>って<ruby>来<rt>き</rt></ruby>た",say:"雨が降って来た",en:"It started to rain.",ne:"पानी पर्न थाल्यो।"},
        {jp:"<ruby>雨降<rt>あめふ</rt></ruby>りだからジメジメする",say:"雨降りだからジメジメする",en:"It is humid because it is raining.",ne:"पानी परेकोले ओसिलो छ।"}]},
  { hira:"おとな", emoji:"🧑", romaji:"otona", en:"adult", ne:"वयस्क", kanji:"<ruby>大人<rt>おとな</rt></ruby>",
    ex:[{jp:"お<ruby>酒<rt>さけ</rt></ruby>は<ruby>大人<rt>おとな</rt></ruby>になってから",say:"お酒は大人になってから",en:"Alcohol only after you are an adult.",ne:"रक्सी वयस्क भएपछि मात्र।"},
        {jp:"<ruby>大人<rt>おとな</rt></ruby>1,000<ruby>円<rt>えん</rt></ruby> <ruby>学生<rt>がくせい</rt></ruby>300<ruby>円<rt>えん</rt></ruby>",say:"大人千円、学生三百円",en:"Adults 1,000 yen, students 300 yen.",ne:"वयस्क १,००० येन, विद्यार्थी ३०० येन।"}]},
  { hira:"えいえん", emoji:"♾️", romaji:"eien", en:"eternity / forever", ne:"अनन्त / सधैं", kanji:"<ruby>永遠<rt>えいえん</rt></ruby>",
    ex:[{jp:"<ruby>時間<rt>じかん</rt></ruby>は<ruby>永遠<rt>えいえん</rt></ruby>じゃない",say:"時間は永遠じゃない",en:"Time is not eternal.",ne:"समय अनन्त छैन।"},
        {jp:"<ruby>永遠<rt>えいえん</rt></ruby>に<ruby>一緒<rt>いっしょ</rt></ruby>にいたい",say:"永遠に一緒にいたい",en:"I want to be together forever.",ne:"सधैंभरि सँगै बस्न चाहन्छु।"}]},
  { hira:"みず", emoji:"💧", romaji:"mizu", en:"water", ne:"पानी", kanji:"<ruby>水<rt>みず</rt></ruby>",
    ex:[{jp:"<ruby>水<rt>みず</rt></ruby>を<ruby>飲<rt>の</rt></ruby>む",say:"水を飲む",en:"to drink water",ne:"पानी पिउनु"},
        {jp:"<ruby>冷<rt>つめ</rt></ruby>たい<ruby>水<rt>みず</rt></ruby>がほしい",say:"冷たい水がほしい",en:"I want cold water.",ne:"मलाई चिसो पानी चाहियो।"}]},
  { hira:"ねこ", emoji:"🐱", romaji:"neko", en:"cat", ne:"बिरालो", kanji:"<ruby>猫<rt>ねこ</rt></ruby>",
    ex:[{jp:"<ruby>猫<rt>ねこ</rt></ruby>が<ruby>好<rt>す</rt></ruby>き",say:"猫が好き",en:"I like cats.",ne:"मलाई बिरालो मन पर्छ।"},
        {jp:"<ruby>猫<rt>ねこ</rt></ruby>が<ruby>寝<rt>ね</rt></ruby>てる",say:"猫が寝てる",en:"The cat is sleeping.",ne:"बिरालो सुतिरहेको छ।"}]},
  { hira:"いえ", emoji:"🏠", romaji:"ie", en:"house / home", ne:"घर", kanji:"<ruby>家<rt>いえ</rt></ruby>",
    ex:[{jp:"<ruby>家<rt>いえ</rt></ruby>に<ruby>帰<rt>かえ</rt></ruby>る",say:"家に帰る",en:"to go home",ne:"घर फर्कनु"},
        {jp:"<ruby>家<rt>いえ</rt></ruby>でごはんを<ruby>食<rt>た</rt></ruby>べる",say:"家でごはんを食べる",en:"to eat at home",ne:"घरमा खाना खानु"}]},
  { hira:"あさ", emoji:"🌅", romaji:"asa", en:"morning", ne:"बिहान", kanji:"<ruby>朝<rt>あさ</rt></ruby>",
    ex:[{jp:"<ruby>朝<rt>あさ</rt></ruby>ごはんを<ruby>食<rt>た</rt></ruby>べる",say:"朝ごはんを食べる",en:"to eat breakfast",ne:"बिहानको खाना खानु"},
        {jp:"<ruby>朝<rt>あさ</rt></ruby>は<ruby>寒<rt>さむ</rt></ruby>い",say:"朝は寒い",en:"Mornings are cold.",ne:"बिहान चिसो हुन्छ।"}]},
  { hira:"ともだち", emoji:"👫", romaji:"tomodachi", en:"friend", ne:"साथी", kanji:"<ruby>友達<rt>ともだち</rt></ruby>",
    ex:[{jp:"<ruby>友達<rt>ともだち</rt></ruby>になる",say:"友達になる",en:"to become friends",ne:"साथी बन्नु"},
        {jp:"<ruby>友達<rt>ともだち</rt></ruby>と<ruby>話<rt>はな</rt></ruby>す",say:"友達と話す",en:"to talk with a friend",ne:"साथीसँग कुरा गर्नु"}]},
  { hira:"たべる", emoji:"🍽️", romaji:"taberu", en:"to eat", ne:"खानु", kanji:"<ruby>食<rt>た</rt></ruby>べる",
    ex:[{jp:"ごはんを<ruby>食<rt>た</rt></ruby>べる",say:"ごはんを食べる",en:"to eat a meal",ne:"खाना खानु"},
        {jp:"<ruby>一緒<rt>いっしょ</rt></ruby>に<ruby>食<rt>た</rt></ruby>べよう",say:"一緒に食べよう",en:"Let us eat together.",ne:"सँगै खाऔं।"}]},
  { hira:"みる", emoji:"👀", romaji:"miru", en:"to see / to watch", ne:"हेर्नु", kanji:"<ruby>見<rt>み</rt></ruby>る",
    ex:[{jp:"テレビを<ruby>見<rt>み</rt></ruby>る",say:"テレビを見る",en:"to watch TV",ne:"टिभी हेर्नु"},
        {jp:"<ruby>写真<rt>しゃしん</rt></ruby>を<ruby>見<rt>み</rt></ruby>る",say:"写真を見る",en:"to look at photos",ne:"फोटो हेर्नु"}]},
  { hira:"すき", emoji:"💕", romaji:"suki", en:"to like / to love", ne:"मन पर्ने", kanji:"<ruby>好<rt>す</rt></ruby>き",
    ex:[{jp:"あなたが<ruby>好<rt>す</rt></ruby>き",say:"あなたが好き",en:"I like you.",ne:"मलाई तिमी मन पर्छ।"},
        {jp:"<ruby>日本<rt>にほん</rt></ruby>が<ruby>好<rt>す</rt></ruby>き",say:"日本が好き",en:"I like Japan.",ne:"मलाई जापान मन पर्छ।"}]},

          en:"A standard business greeting used at the start of a call or email.", ne:"फोन/इमेलको सुरुमा प्रयोग हुने व्यापारिक अभिवादन।"},
    dialog:[{who:"a",jp:"お<ruby>電話<rt>でんわ</rt></ruby>ありがとうございます。",say:"お電話ありがとうございます。",en:"Thank you for your call.",ne:"फोन गर्नुभएकोमा धन्यवाद।"},
            {who:"b",jp:"いつもお<ruby>世話<rt>せわ</rt></ruby>になっております。",say:"いつもお世話になっております。",en:"Thank you for your continued support.",ne:"सधैं सहयोगका लागि धन्यवाद।"}]}
];

// build cells: reveal head/tail chars of the key word as HINTS, blank only the middle
// 先頭 n 文字をブランク（選択対象）、残りはすべて表示
function buildCells(hira, n){
  return Array.from(hira).map((c, i) => ({
    c,
    blank: i < n,
    hint:  false,
    punc:  "、。！？・".includes(c)
  }));
}
const SENTENCES = RAW_SENTS.map(s => ({ ...s, cells: buildCells(s.hira, 3) }));

const POOL = ["か","さ","た","な","は","ま","や","ら","わ","き","し","ち","に","ひ","み","り",
  "く","つ","ふ","む","ゆ","る","け","せ","て","ね","へ","め","れ","こ","そ","の","ほ","も",
  "よ","ろ","を","ん","あ","い","う","え","お","かい","na"].filter(x=>x.length===1);

/* ============================================================ AUDIO ============ */
let actx=null;
function unlockAudio(){ if(actx) return; try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} if(actx&&actx.state==="suspended") actx.resume(); }
function tone(f,d,t,when,v){ if(!actx) return; const s=actx.currentTime+(when||0),o=actx.createOscillator(),g=actx.createGain();
  o.type=t||"sine"; o.frequency.value=f; g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(v||0.18,s+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,s+d); o.connect(g); g.connect(actx.destination); o.start(s); o.stop(s+d+0.02); }
const sCorrect=()=>{ tone(660,0.12,"triangle",0,0.2); tone(990,0.16,"triangle",0.07,0.18); };
const sWrong=()=>{ tone(150,0.18,"sawtooth",0,0.14); };
const sDone=()=>{ [523,659,784,1047].forEach((f,i)=>tone(f,0.3,"triangle",i*0.08,0.18)); };

/* ============================================================ SPEECH =========== */
let jaVoice=null;
function loadVoices(){ if(!("speechSynthesis" in window)) return; const vs=speechSynthesis.getVoices();
  jaVoice = vs.find(v=>v.lang==="ja-JP") || vs.find(v=>(v.lang||"").startsWith("ja")) || null; }
if("speechSynthesis" in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function speak(text){ if(!("speechSynthesis" in window)) return; speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang="ja-JP"; u.rate=0.85; if(jaVoice) u.voice=jaVoice; speechSynthesis.speak(u); }

/* ============================================================ GAME ============== */
const $ = id=>document.getElementById(id);
const field=$("field"), board=$("board");
const reduce=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const SPEEDS=[{l:"×1",m:1.0},{l:"×1.5",m:1.5},{l:"×2",m:2.0}];
let speedIdx=1;

let allItems=[], pos=0, item=null, target=[], nextIndex=0;
let slotEls=[], bubbles=[], W=0, H=0, raf=null, locked=false;
let hintShown=false;

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function speedMul(){ return SPEEDS[speedIdx].m * (reduce?0.4:1); }

function startGame(m){
  unlockAudio();
  if("speechSynthesis" in window){ try{speechSynthesis.cancel();}catch(e){} }
  allItems = m==="word"
    ? shuffle(WORDS.map(w=>({...w,type:"word"})))
    : shuffle(SENTENCES.map(s=>({...s,type:"sent"})));
  pos=0;
  $("title").classList.remove("on"); $("game").classList.add("on");
  requestAnimationFrame(()=>{ measure(); loadItem(); });
}
function measure(){ const r=field.getBoundingClientRect(); W=r.width; H=r.height; }

function loadItem(){
  item=allItems[pos]; nextIndex=0; locked=false; slotEls=[];
  $("prog").textContent=(pos+1)+" / "+allItems.length;
  if(item.type==="word") buildWordBoard(); else buildSentBoard();
  setHint(); applyHintVisibility();
  buildField();
  if(raf) cancelAnimationFrame(raf); tick();
}

function buildWordBoard(){
  target=Array.from(item.hira);
  board.innerHTML="";
  const wrap=document.createElement("div"); wrap.className="slots";
  target.forEach(ch=>{ const d=document.createElement("div"); d.className="slot guide"; d.textContent=ch; wrap.appendChild(d); slotEls.push(d); });
  board.appendChild(wrap);
}
function buildSentBoard(){
  target=[];
  board.innerHTML="";
  const line=document.createElement("div"); line.className="sline";
  item.cells.forEach(cell=>{
    if(cell.blank){
      const b=document.createElement("span"); b.className="bslot"; b.textContent=cell.c; line.appendChild(b); slotEls.push(b); target.push(cell.c);
    }else{
      const s=document.createElement("span"); s.className="cell"+(cell.punc?" punc":"")+(cell.hint?" hint":""); s.textContent=cell.c; line.appendChild(s);
    }
  });
  board.appendChild(line);
}

function setHint(){
  const h=$("hint");
  if(item.type==="word"){ h.innerHTML='<span class="en">'+item.en+'</span> · <span class="ne">'+item.ne+'</span>'; }
  else{ h.innerHTML='<span class="en">'+item.en+'</span><br><span class="ne">'+item.ne+'</span>'; }
}
function applyHintVisibility(){
  hintShown=(item.type==="word");
  $("hint").classList.toggle("hidden", !hintShown);
}

function clearBubbles(){ bubbles.forEach(b=>b.el.remove()); bubbles=[]; }
function buildField(){
  clearBubbles(); measure();
  const chars=target.slice();
  const wanted=item.type==="word" ? Math.min(12,Math.max(8,target.length+6)) : Math.min(13,Math.max(9,target.length+7));
  const avoid=new Set(target);
  for(let i=chars.length;i<wanted;i++){ let c,g=0; do{ c=POOL[Math.floor(Math.random()*POOL.length)]; g++; }while(avoid.has(c)&&g<20); chars.push(c); }
  shuffle(chars); chars.forEach(spawnBubble);
}
function spawnBubble(ch){
  const palette=["blue","red","green","yellow","whiteb"];
  const col=palette[Math.floor(Math.random()*palette.length)];
  const dark=(col==="yellow"||col==="whiteb");
  const r=32;
  const el=document.createElement("div"); el.className="bubble"; el.textContent=ch;
  el.style.background="var(--"+col+")"; el.style.color=dark?"#2B2440":"#fff";
  const x=r+Math.random()*Math.max(1,(W-2*r)), y=r+Math.random()*Math.max(1,(H-2*r));
  const base=0.32+Math.random()*0.5, ang=Math.random()*Math.PI*2;
  const b={el,ch,x,y,base,ang,r,vx:0,vy:0}; applyVel(b); place(b);
  el.addEventListener("click",()=>onTap(b)); field.appendChild(el); bubbles.push(b);
}
function applyVel(b){ const sp=b.base*speedMul(); b.vx=Math.cos(b.ang)*sp; b.vy=Math.sin(b.ang)*sp; }
function place(b){ b.el.style.setProperty("--x",(b.x-b.r)+"px"); b.el.style.setProperty("--y",(b.y-b.r)+"px");
  b.el.style.transform="translate3d("+(b.x-b.r)+"px,"+(b.y-b.r)+"px,0)"; }
function tick(){
  for(const b of bubbles){ b.x+=b.vx; b.y+=b.vy;
    if(b.x<b.r){b.x=b.r;b.vx*=-1;b.ang=Math.atan2(b.vy,b.vx);} if(b.x>W-b.r){b.x=W-b.r;b.vx*=-1;b.ang=Math.atan2(b.vy,b.vx);}
    if(b.y<b.r){b.y=b.r;b.vy*=-1;b.ang=Math.atan2(b.vy,b.vx);} if(b.y>H-b.r){b.y=H-b.r;b.vy*=-1;b.ang=Math.atan2(b.vy,b.vx);}
    place(b); }
  raf=requestAnimationFrame(tick);
}
function onTap(b){
  if(locked) return;
  if(b.ch===target[nextIndex]){
    sCorrect();
    const slot=slotEls[nextIndex]; if(slot){ slot.textContent=target[nextIndex]; slot.classList.add("done"); }
    nextIndex++;
    b.el.classList.add("pop"); const ref=b;
    setTimeout(()=>{ ref.el.remove(); bubbles=bubbles.filter(x=>x!==ref); if(nextIndex<target.length) addDistractor(); },260);
    if(nextIndex>=target.length){ locked=true; setTimeout(reveal,380); }
  }else{ sWrong(); b.el.classList.remove("shake"); void b.el.offsetWidth; b.el.classList.add("shake"); }
}
function addDistractor(){ let c,g=0; do{ c=POOL[Math.floor(Math.random()*POOL.length)]; g++; }while(target.includes(c)&&g<20); spawnBubble(c); }

/* ---------- ANSWER ---------- */
function h(tag,cls,html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function speakBtn(cls,text,handler){ const b=h("button",cls,text); b.addEventListener("click",handler); return b; }

function reveal(){
  sDone();
  const body=$("aBody"); body.innerHTML="";
  if(item.type==="word") renderWordCard(body); else renderSentCard(body);
  $("answer").classList.add("on");
  setTimeout(()=>speak(item.type==="word"?item.hira:item.say),300);
}
function renderWordCard(body){
  const head=h("div","ahead");
  head.appendChild(h("div","emoji",item.emoji));
  head.appendChild(h("div","kanji word",item.kanji));
  head.appendChild(speakBtn("speak","🔊",()=>speak(item.hira)));
  head.appendChild(h("div","romaji",item.romaji));
  body.appendChild(head);
  const means=h("div","means");
  means.appendChild(h("div","mrow en",'<span class="tag en">EN</span><span class="v">'+item.en+'</span>'));
  means.appendChild(h("div","mrow ne",'<span class="tag ne">ने</span><span class="v">'+item.ne+'</span>'));
  body.appendChild(means);
  body.appendChild(h("div","exhead","れいぶん · EXAMPLES · उदाहरण"));
  item.ex.forEach(e=>{
    const box=h("div","ex"); const jp=h("div","jp",e.jp); jp.appendChild(speakBtn("mini","🔊",()=>speak(e.say)));
    box.appendChild(jp); box.appendChild(h("div","en",e.en)); box.appendChild(h("div","ne",e.ne)); body.appendChild(box);
  });
}
function renderSentCard(body){
  const head=h("div","ahead");
  head.appendChild(h("div","kanji sent",item.kanji));
  head.appendChild(speakBtn("speak","🔊",()=>speak(item.say)));
  body.appendChild(head);
  const means=h("div","means");
  means.appendChild(h("div","mrow en",'<span class="tag en">EN</span><span class="v">'+item.en+'</span>'));
  means.appendChild(h("div","mrow ne",'<span class="tag ne">ने</span><span class="v">'+item.ne+'</span>'));
  body.appendChild(means);
  const note=h("div","note");
  note.appendChild(h("div","lb","POINT · ポイント"));
  note.appendChild(h("div","jp",item.note.jp));
  note.appendChild(h("div","sm",'<span class="en">'+item.note.en+'</span><br><span class="ne">'+item.note.ne+'</span>'));
  body.appendChild(note);
  body.appendChild(h("div","exhead","かいわ · CONVERSATION · कुराकानी"));
  item.dialog.forEach(t=>{
    const turn=h("div","turn");
    turn.appendChild(h("div","who "+t.who, t.who==="a"?"A":"B"));
    const bub=h("div","bub");
    const jp=h("div","jp",t.jp); jp.appendChild(speakBtn("mini","🔊",()=>speak(t.say)));
    bub.appendChild(jp); bub.appendChild(h("div","en",t.en)); bub.appendChild(h("div","ne",t.ne));
    turn.appendChild(bub); body.appendChild(turn);
  });
}
function nextWord(){ $("answer").classList.remove("on"); pos=(pos+1)%allItems.length; loadItem(); }

/* ---------- controls ---------- */
function goHome(){ if(raf) cancelAnimationFrame(raf); clearBubbles(); $("answer").classList.remove("on");
  $("game").classList.remove("on"); $("title").classList.add("on"); }

document.querySelectorAll(".mode[data-mode]").forEach(btn=>btn.addEventListener("click",()=>startGame(btn.dataset.mode)));
$("nextBtn").addEventListener("click",nextWord);
$("homeBtn").addEventListener("click",goHome);
$("hintBtn").addEventListener("click",()=>{ hintShown=!hintShown; $("hint").classList.toggle("hidden",!hintShown); });
$("speedBtn").addEventListener("click",()=>{ speedIdx=(speedIdx+1)%SPEEDS.length; $("speedBtn").textContent=SPEEDS[speedIdx].l; bubbles.forEach(applyVel); });
$("speedBtn").textContent=SPEEDS[speedIdx].l;
window.addEventListener("resize",()=>{ if($("game").classList.contains("on")) measure(); });
</script>
</body>
</html>
