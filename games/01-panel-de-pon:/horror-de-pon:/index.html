<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ホラーでポン | ホラー・アクションパズル</title>
<style>
  :root{
    --steel-900:#0a0608;
    --steel-800:#140d10;
    --steel-700:#1f1418;
    --steel-line:#3a2228;
    --iwaki-blue:#8b1a1a;
    --iwaki-cyan:#e03c3c;
    --safety-yellow:#d4302f;
    --panel-md:#1976d2;
    --panel-mx:#00897b;
    --panel-eh:#ef6c00;
    --panel-yts:#f3b212;
    --panel-mtr:#6a5acd;
    --panel-fit:#d23c3c;
    --text-main:#e8dde0;
    --text-dim:#9a8088;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  html{
    touch-action:none;
    overscroll-behavior:none;
  }
  body{
    background:
      repeating-linear-gradient(45deg, transparent 0 14px, rgba(255,0,0,.012) 14px 28px),
      radial-gradient(ellipse at 50% 0%, #1a0a0c 0%, #0a0406 55%, #050203 100%);
    position:relative; overflow-x:hidden;
    color:var(--text-main);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;
    user-select:none;-webkit-user-select:none;
    touch-action:manipulation;
  }
  header{
    width:100%;max-width:560px;
    padding:6px 14px 4px;
    display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
  }
  .logo{
    font-weight:900;font-size:21px;letter-spacing:1px;
    color:#fff;
    text-shadow:0 2px 0 rgba(0,0,0,.4);
  }
  .logo .pon{color:var(--iwaki-cyan);}
  .logo-sub{
    font-size:10.5px;color:var(--text-dim);letter-spacing:.18em;
    border-left:3px solid var(--iwaki-blue);padding-left:8px;
  }
  #game-wrap{
    width:100%;max-width:560px;
    display:flex;flex-direction:column;align-items:center;
    padding:0 4px 16px;
  }
  #hud{
    width:100%;
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;
    margin-bottom:6px;
  }
  .hud-box{
    background:var(--steel-800);
    border:1px solid var(--steel-line);
    border-radius:6px;
    padding:3px 9px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  }
  .hud-label{font-size:9.5px;color:var(--text-dim);letter-spacing:.14em;}
  .hud-value{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.15;}
  #hud-chain .hud-value{color:var(--safety-yellow);}
  #stage{
    position:relative;width:100%;
    display:flex;justify-content:center;
  }
  #board-frame{
    position:relative;
    background:linear-gradient(180deg,#2a3a4c,#1b2735);
    border:1px solid #3c5066;
    border-radius:10px;
    padding:6px;
    box-shadow:0 10px 30px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
  }
  /* リベット風 */
  #board-frame::before,#board-frame::after{
    content:"";position:absolute;width:7px;height:7px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#9fb4c8,#4a5d70 70%);
    top:6px;
  }
  #board-frame::before{left:6px;}
  #board-frame::after{right:6px;}
  canvas{display:block;border-radius:5px;background:#08040a;touch-action:none;}
  #overlay{
    position:absolute;inset:6px;
    background:rgba(8,14,20,.86);
    border-radius:5px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:12px;gap:8px;
    backdrop-filter:blur(2px);
    overflow-y:auto;overflow-x:hidden;
    box-sizing:border-box;
  }
  #overlay.hidden{display:none;}
  #overlay h2{font-size:21px;font-weight:900;letter-spacing:.06em;margin:0;}
  #overlay p{font-size:12px;color:var(--text-dim);line-height:1.7;margin:0;}
  #overlay .final-score{font-size:28px;font-weight:900;color:var(--safety-yellow);}
  .btn-main{
    touch-action:manipulation;
    font-family:inherit;
    background:linear-gradient(180deg,var(--iwaki-cyan),var(--iwaki-blue));
    color:#fff;border:none;border-radius:8px;
    font-size:16px;font-weight:800;letter-spacing:.1em;
    padding:12px 34px;cursor:pointer;
    box-shadow:0 4px 0 #084a7c, 0 6px 14px rgba(0,0,0,.45);
  }
  .btn-main:active{transform:translateY(3px);box-shadow:0 1px 0 #084a7c;}
  #controls{
    width:100%;
    display:flex;justify-content:space-between;align-items:center;
    margin-top:8px;gap:10px;
  }
  .pad{display:grid;grid-template-columns:repeat(3,46px);grid-template-rows:repeat(2,42px);gap:4px;}
  .pad button, .act button{
    touch-action:manipulation;
    font-family:inherit;
    background:linear-gradient(180deg,#33465a,#22303f);
    border:1px solid #44597000;border:1px solid #445970;
    color:var(--text-main);
    border-radius:7px;font-size:16px;font-weight:700;
    cursor:pointer;
    box-shadow:0 3px 0 #141d27;
  }
  .pad button:active, .act button:active{transform:translateY(2px);box-shadow:0 1px 0 #141d27;}
  .pad #bt-up{grid-column:2;grid-row:1;}
  .pad #bt-left{grid-column:1;grid-row:2;}
  .pad #bt-down{grid-column:2;grid-row:2;}
  .pad #bt-right{grid-column:3;grid-row:2;}
  .act{display:flex;flex-direction:column;gap:6px;}
  .act button{width:108px;height:42px;font-size:13px;letter-spacing:.06em;}
  #bt-swap{background:linear-gradient(180deg,var(--iwaki-cyan),var(--iwaki-blue));box-shadow:0 3px 0 #084a7c;}
  #bt-raise{background:linear-gradient(180deg,#f0a93c,#cf7f0d);box-shadow:0 3px 0 #8a5406;color:#1c1206;}
  #legend{
    width:100%;margin-top:14px;
    background:var(--steel-800);
    border:1px solid var(--steel-line);
    border-radius:8px;padding:10px 12px;
  }
  #legend h3{
    font-size:10.5px;color:var(--text-dim);letter-spacing:.18em;margin-bottom:8px;
    display:flex;align-items:center;gap:8px;
  }
  #legend h3::after{content:"";flex:1;height:1px;background:var(--steel-line);}
  .legend-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:11px;}
  .legend-chip{width:22px;height:22px;border-radius:5px;flex:none;border:1px solid rgba(255,255,255,.25);}
  .legend-item small{display:block;color:var(--text-dim);font-size:9px;}
  #howto{
    width:100%;margin-top:8px;
    font-size:10.5px;color:var(--text-dim);line-height:1.9;
    padding:0 4px;
  }
  #howto b{color:var(--text-main);}
  kbd{
    background:#2b3b4c;border:1px solid #46596d;border-bottom-width:2px;
    border-radius:4px;padding:0 5px;font-size:10px;color:#dce6ef;
    font-family:inherit;
  }
  /* ===== ステージ背景エフェクト ===== */
  #bg-canvas{
    position:fixed;top:0;left:0;width:100vw;height:100vh;
    pointer-events:none;z-index:0;opacity:0;
    transition:opacity .6s;
  }
  #bg-canvas.active{opacity:1;}
  #game-wrap, header{ position:relative; z-index:1; }

  /* ステージ2: 血月 */
  body.stage2{
    background:radial-gradient(ellipse at 50% 0%, #2a0608 0%, #100204 55%, #050102 100%);
  }
  /* ステージ2: 血のネオン管フレーム */
  @keyframes neon-cycle{
    0%   {border-color:#ff2e2e; box-shadow:0 0 6px #ff2e2e, 0 0 16px #c00, 0 0 30px #900, inset 0 0 12px rgba(255,46,46,.5);}
    33%  {border-color:#8a0000; box-shadow:0 0 6px #8a0000, 0 0 16px #5a0000, 0 0 26px #400, inset 0 0 12px rgba(138,0,0,.5);}
    66%  {border-color:#ff5050; box-shadow:0 0 6px #ff5050, 0 0 16px #d01010, 0 0 30px #900, inset 0 0 12px rgba(255,80,80,.5);}
    100% {border-color:#ff2e2e; box-shadow:0 0 6px #ff2e2e, 0 0 16px #c00, 0 0 30px #900, inset 0 0 12px rgba(255,46,46,.5);}
  }
  body.stage2 #board-frame{
    background:linear-gradient(180deg,#160808,#0a0404);
    border:3px solid #ff2e2e;
    border-radius:14px;
    animation:neon-cycle 4s linear infinite;
  }
  body.stage2 #board-frame::before,
  body.stage2 #board-frame::after{
    display:none;
  }
  /* ステージ2: HUDボックスも血ネオンに */
  body.stage2 .hud-box{
    background:linear-gradient(180deg,#160808,#0a0404);
    border:2px solid #ff2e2e;
    animation:neon-cycle 4s linear infinite;
  }
  body.stage2 .hud-box:nth-child(1){ animation-delay:0s; }
  body.stage2 .hud-box:nth-child(2){ animation-delay:-1.3s; }
  body.stage2 .hud-box:nth-child(3){ animation-delay:-2.6s; }

  /* ステージ3: 業火 */
  body.stage3{
    background:radial-gradient(ellipse at 50% 100%, #2a0e02 0%, #120602 55%, #050201 100%);
  }
  /* ステージ3: 周回 業火フレーム */
  @keyframes rotate-conic{
    to{ transform:rotate(1turn); }
  }
  body.stage3 #board-frame, body.stage3 .hud-box{
    position:relative;
    background:linear-gradient(180deg,#160a04,#0a0502);
    border:2px solid transparent;
    z-index:0;
    overflow:hidden;
  }
  body.stage3 #board-frame{ border-radius:14px; }
  /* 周回する炎の帯 */
  body.stage3 #board-frame::before,
  body.stage3 .hud-box::before{
    content:"";
    position:absolute;
    z-index:-2;
    left:-50%; top:-50%;
    width:200%; height:200%;
    background:conic-gradient(from 0deg,
      #ff1500, #ff6a00, #ffb300, #ff3000, #990000,
      #ff1500, #ff6a00, #ffb300, #ff3000, #990000, #ff1500);
    animation:rotate-conic 1.1s linear infinite;
  }
  /* メインフレームはさらに速く周回感を強調 */
  body.stage3 #board-frame::before{
    animation:rotate-conic 0.9s linear infinite;
  }
  /* 内側を塗りつぶして枠だけ光らせる */
  body.stage3 #board-frame::after,
  body.stage3 .hud-box::after{
    content:"";
    position:absolute;
    z-index:-1;
    inset:3px;
    background:linear-gradient(180deg,#0d160d,#081008);
    border-radius:11px;
  }
  body.stage3 .hud-box::after{ border-radius:5px; inset:2px; }
  body.stage3 .hud-box{ border:none; }

  /* ステージ選択 */
  .stage-select{display:flex;gap:6px;justify-content:center;width:100%;margin:6px 0;box-sizing:border-box;}
  .stage-btn{
    flex:1;min-width:0;
    box-sizing:border-box;
    background:rgba(255,255,255,.07);
    border:2px solid rgba(255,255,255,.18);
    border-radius:9px;padding:7px 3px;
    color:#fff;font-family:inherit;font-size:10px;font-weight:700;
    cursor:pointer;text-align:center;line-height:1.35;
    transition:border-color .2s, background .2s;
    touch-action:manipulation;
  }
  .stage-btn:active{transform:scale(.96);}
  .stage-btn.selected{border-color:#37a7e0;background:rgba(55,167,224,.18);}
  .stage-btn .stage-icon{font-size:18px;display:block;margin-bottom:2px;}
  .stage-btn small{font-size:8.5px;}

  @keyframes rainbow-text{
    0%  {color:#ff4e4e;}
    16% {color:#ffaa00;}
    33% {color:#ffe600;}
    50% {color:#4dff91;}
    66% {color:#38d4ff;}
    83% {color:#b56bff;}
    100%{color:#ff4e4e;}
  }
  @keyframes rainbow-border{
    0%  {border-color:#ff4e4e;box-shadow:0 0 14px #ff4e4e99;}
    16% {border-color:#ffaa00;box-shadow:0 0 14px #ffaa0099;}
    33% {border-color:#ffe600;box-shadow:0 0 14px #ffe60099;}
    50% {border-color:#4dff91;box-shadow:0 0 14px #4dff9199;}
    66% {border-color:#38d4ff;box-shadow:0 0 14px #38d4ff99;}
    83% {border-color:#b56bff;box-shadow:0 0 14px #b56bff99;}
    100%{border-color:#ff4e4e;box-shadow:0 0 14px #ff4e4e99;}
  }
  .rainbow-box{
    width:100%;padding:8px 14px;border-radius:10px;
    border:2.5px solid #ff4e4e;box-sizing:border-box;
    background:rgba(0,0,0,.6);text-align:center;
    animation:rainbow-border 2s linear infinite;
  }
  .rainbow-en{
    font-size:14px;font-weight:900;letter-spacing:.07em;
    animation:rainbow-text 2s linear infinite;
    text-shadow:0 0 10px currentColor;
    line-height:1.35;
  }
  .rainbow-ja{
    font-size:11.5px;color:#f0f0f0;margin-top:3px;
    letter-spacing:.14em;font-weight:700;
    text-shadow:0 1px 5px rgba(0,0,0,.9);
  }
  @media (max-width:420px){
    .pad{grid-template-columns:repeat(3,42px);grid-template-rows:repeat(2,38px);}
    .act button{width:92px;height:38px;}
  }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<header>
  <div class="logo">ホラーで<span class="pon">ポン</span></div>
  <div class="logo-sub">HORROR<br>ACTION PUZZLE</div>
</header>

<div id="game-wrap">
  <div id="hud">
    <div class="hud-box"><div class="hud-label">SCORE</div><div class="hud-value" id="hud-score">0</div></div>
    <div class="hud-box" id="hud-chain"><div class="hud-label">MAX CHAIN</div><div class="hud-value" id="hud-maxchain">-</div></div>
    <div class="hud-box"><div class="hud-label">SPEED LV</div><div class="hud-value" id="hud-level">1</div></div>
  </div>

  <div id="stage">
    <div id="board-frame">
      <canvas id="cv"></canvas>
      <div id="overlay">
        <h2>ホラーでポン</h2>
        <p>
          同じパネルをタテ・ヨコに3枚以上<br>
          揃えて消そう。天井まで積むとゲームオーバー!
        </p>
        <div class="stage-select">
          <button class="stage-btn selected" data-stage="1"><span class="stage-icon">🌑</span>STAGE 1<br><small style="color:#9a8088">闇夜</small></button>
          <button class="stage-btn" data-stage="2"><span class="stage-icon">🩸</span>STAGE 2<br><small style="color:#9a8088">血月</small></button>
          <button class="stage-btn" data-stage="3"><span class="stage-icon">🔥</span>STAGE 3<br><small style="color:#9a8088">業火</small></button>
        </div>
        <button class="btn-main" id="bt-start">はじめる</button>
      </div>
    </div>
  </div>

  <div id="controls">
    <div class="pad">
      <button id="bt-up">▲</button>
      <button id="bt-left">◀</button>
      <button id="bt-down">▼</button>
      <button id="bt-right">▶</button>
    </div>
    <div class="act">
      <button id="bt-swap">入替 (SWAP)</button>
      <button id="bt-raise">せり上げ</button>
    </div>
  </div>

  <div id="legend">
    <h3>PANEL LINE-UP / 登場製品</h3>
    <div class="legend-grid" id="legend-grid"></div>
  </div>

  <div id="howto">
    <b>キーボード操作:</b> <kbd>←</kbd><kbd>↑</kbd><kbd>↓</kbd><kbd>→</kbd> カーソル移動 /
    <kbd>Space</kbd> or <kbd>Z</kbd> 入替 / <kbd>X</kbd> or <kbd>Shift</kbd> せり上げ(長押し)<br>
    <b>タッチ操作:</b> 盤面タップでカーソル移動、同じ場所をもう一度タップで入替。<br>
    <b>連鎖:</b> パネルが消えて落ちた先でさらに揃うと連鎖!得点が大きく伸びる。4枚以上同時消しのコンボもボーナス。
  </div>
</div>

/* ================= DOM ================= */
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const overlay = document.getElementById("overlay");
const hudScore = document.getElementById("hud-score");
const hudMax = document.getElementById("hud-maxchain");
const hudLevel = document.getElementById("hud-level");

let CELL = 44, DPR = 1;
function layout(){
  const wrapW = Math.min(document.getElementById("game-wrap").clientWidth - 8, 560);
  // ヘッダー+HUD+操作ボタン+余白ぶんを差し引いた高さを盤面に全部使う
  const hdr = document.querySelector("header");
  const hud = document.getElementById("hud");
  const ctrl = document.getElementById("controls");
  const reserved =
    (hdr ? hdr.offsetHeight : 45) +
    (hud ? hud.offsetHeight : 50) +
    (ctrl ? ctrl.offsetHeight : 95) + 52; // フレーム枠+マージン
  const availH = Math.max(300, window.innerHeight - reserved);
  CELL = Math.floor(Math.min(wrapW/COLS, availH/ROWS));
  CELL = Math.max(30, Math.min(96, CELL));
  DPR = window.devicePixelRatio || 1;
  cv.width = COLS*CELL*DPR;
  cv.height = ROWS*CELL*DPR;
  cv.style.width = COLS*CELL+"px";
  cv.style.height = ROWS*CELL+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize", layout);
layout();

/* ================= サウンド(WebAudio簡易) ================= */
let AC=null;
function audio(){
  if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
  if(AC && AC.state==="suspended"){ AC.resume(); }
  return AC;
}
function beep(freq, dur=0.07, type="square", vol=0.05){
  const ac=audio(); if(!ac) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  o.connect(g).connect(ac.destination);
  o.start(); o.stop(ac.currentTime+dur);
}
function sndSwap(){ beep(420,0.05,"square",0.04); }
function sndPop(i,chain){ beep(560 + i*60 + (chain-1)*120, 0.09, "triangle", 0.07); }
function sndRise(){ beep(180,0.04,"sawtooth",0.025); }
function sndOver(){ beep(220,0.4,"sawtooth",0.08); setTimeout(()=>beep(150,0.6,"sawtooth",0.08),250); }

/* ================= 盤面生成 ================= */
function cell(t){ return {t, st:"idle", timer:0, popDelay:0, chain:false}; }

function pickType(avoid){
  let t;
  do{ t = (Math.random()*NTYPE)|0; }while(avoid.has(t));
  return t;
}
function genRow(){
  const row = new Array(COLS).fill(null);
  for(let c=0;c<COLS;c++){
    const avoid = new Set();
    // 横3連を避ける
    if(c>=2 && row[c-1] && row[c-2] && row[c-1].t===row[c-2].t) avoid.add(row[c-1].t);
    // 縦3連を避ける(現在の下2段=せり上がり後に真上に来る段)
    if(board && board[0][c] && board[1][c] && board[0][c].t===board[1][c].t) avoid.add(board[0][c].t);
    if(avoid.size>=NTYPE) avoid.clear();
    row[c]=cell(pickType(avoid));
  }
  return row;
}
function initBoard(){
  board = Array.from({length:ROWS},()=>new Array(COLS).fill(null));
  // 初期の山(列ごとに高さ4〜6)
  const h=[];
  for(let c=0;c<COLS;c++) h[c] = 4 + ((Math.random()*3)|0);
  for(let c=0;c<COLS;c++){
    for(let r=0;r<h[c];r++){
      const avoid=new Set();
      if(c>=2 && board[r][c-1] && board[r][c-2] && board[r][c-1].t===board[r][c-2].t) avoid.add(board[r][c-1].t);
      if(r>=2 && board[r-1][c] && board[r-2][c] && board[r-1][c].t===board[r-2][c].t) avoid.add(board[r-1][c].t);
      if(avoid.size>=NTYPE) avoid.clear();
      board[r][c]=cell(pickType(avoid));
    }
  }
  nextRow = genRow();
}

/* ================= 入替 ================= */
function trySwap(){
  if(!running) return;
  const a=board[cursorY][cursorX], b=board[cursorY][cursorX+1];
  if(a && a.st!=="idle") return;
  if(b && b.st!=="idle") return;
  if(!a && !b) return;
  board[cursorY][cursorX]=b;
  board[cursorY][cursorX+1]=a;
  swapAnim={x:cursorX, y:cursorY, t:0};
  sndSwap();
}

/* ================= 落下 ================= */
function doFallPass(){
  let fell=false;
  for(let r=1;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const p=board[r][c];
      if(p && p.st==="idle" && !board[r-1][c]){
        board[r-1][c]=p;
        board[r][c]=null;
        fell=true;
      }
    }
  }
  return fell;
}
function anyFloating(){
  for(let r=1;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      if(board[r][c] && board[r][c].st==="idle" && !board[r-1][c]) return true;
  return false;
}

/* ================= マッチ判定 ================= */
function canMatch(r,c){
  const p=board[r][c];
  return p && p.st==="idle" && (r===0 || board[r-1][c]!==null);
}
function scanMatches(){
  const hit = new Set();
  // 横
  for(let r=0;r<ROWS;r++){
    let run=1;
    for(let c=1;c<=COLS;c++){
      const same = c<COLS && canMatch(r,c) && canMatch(r,c-1) && board[r][c].t===board[r][c-1].t;
      if(same) run++;
      else{
        if(run>=3) for(let k=c-run;k<c;k++) hit.add(r*COLS+k);
        run=1;
      }
    }
  }
  // 縦
  for(let c=0;c<COLS;c++){
    let run=1;
    for(let r=1;r<=ROWS;r++){
      const same = r<ROWS && canMatch(r,c) && canMatch(r-1,c) && board[r][c].t===board[r-1][c].t;
      if(same) run++;
      else{
        if(run>=3) for(let k=r-run;k<r;k++) hit.add(k*COLS+c);
        run=1;
      }
    }
  }
  return hit;
}

function handleMatches(){
  const hit = scanMatches();
  if(hit.size===0) return;

  let chained=false, idx=0;
  let repType=-1;
  hit.forEach(id=>{
    const r=(id/COLS)|0, c=id%COLS;
    const p=board[r][c];
    if(p.chain) chained=true;
    if(repType<0) repType=p.t;
  });
  chainCount = chained ? chainCount+1 : 1;
  maxChain = Math.max(maxChain, chainCount);

  // スコア計算
  const n=hit.size;
  let gain = n*10;
  if(n>=4) gain += (n-3)*20;
  if(chainCount>=2) gain += 40*Math.pow(2, Math.min(chainCount-1,8));
  gain = Math.round(gain * (1 + (level-1)*0.1));
  score += gain;

  // セルをマッチ状態へ
  const ids=[...hit].sort((a,b)=>{
    const ra=(a/COLS)|0, ca=a%COLS, rb=(b/COLS)|0, cb=b%COLS;
    return (rb-ra)||(ca-cb); // 上の段から順に弾ける
  });
  ids.forEach((id,i)=>{
    const r=(id/COLS)|0, c=id%COLS;
    const p=board[r][c];
    p.st="match"; p.timer=0; p.popDelay=i*POP_STAGGER;
  });

  // 浮遊テキスト
  const s=SERIES[repType];
  let label = s.key;
  if(chainCount>=2) label = chainCount+"連鎖!! +"+gain;
  else if(n>=4)     label = n+"コンボ! +"+gain;
  else              label = "+"+gain;
  const r0=(ids[0]/COLS)|0, c0=ids[0]%COLS;
  floats.push({
    x:(c0+0.5)*CELL, y:(ROWS-1-r0)*CELL,
    text:label, t:0,
    color: chainCount>=2 ? "#ffd54a" : "#ffffff",
    big: chainCount>=2 || n>=4
  });
  updateHUD();
}

function progressPops(dt){
  let popIdx=0;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const p=board[r][c];
      if(!p || p.st!=="match") continue;
      p.timer += dt;
      if(p.timer >= FLASH_MS + p.popDelay){
        // 消滅。上にあるパネルへ連鎖フラグ
        for(let rr=r+1;rr<ROWS;rr++){
          const q=board[rr][c];
          if(q && q.st==="idle") q.chain=true;
        }
        // ステージ別の消去エフェクト発生
        spawnPopFx(c, r, p.t);
        board[r][c]=null;
        sndPop(popIdx++, chainCount);
      }
    }
  }
}

/* ===== 消去エフェクト(ステージ別) ===== */
let popFx = [];
function spawnPopFx(c, r, type){
  const cx=(c+0.5)*CELL;
  const cy=(ROWS-1-r)*CELL - riseOffset*CELL + CELL*0.5;

  // ===== 血飛沫(全ステージ共通) =====
  const BLOOD=["#8a0303","#b81414","#6b0000","#a30808","#d42020"];
  let bn = currentStage===3 ? 16 : currentStage===2 ? 13 : 10;
  for(let i=0;i<bn;i++){
    const ang=Math.random()*Math.PI*2;
    const sp=Math.random()*3.2+1.0;
    popFx.push({
      kind:"blood", x:cx, y:cy,
      vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp - 0.8,
      r:Math.random()*4+1.8,
      color:BLOOD[(Math.random()*BLOOD.length)|0],
      life:0, max:Math.random()*300+520,
      grav:0.10+Math.random()*0.05
    });
  }
  // 中央の血の弾け
  popFx.push({kind:"bloodflash", x:cx, y:cy, r:CELL*0.5, life:0, max:240});

  // ===== ステージ別の追加演出 =====
  if(currentStage===2){
    // 血の赤を基調にした飛散リング
    for(let i=0;i<10;i++){
      const ang=(Math.PI*2/10)*i + Math.random()*0.5;
      const sp=Math.random()*3.4+1.8;
      popFx.push({
        kind:2, x:cx, y:cy,
        vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp,
        r:Math.random()*4+2.5, hue:Math.random()*360,
        life:0, max:580
      });
    }
    const baseHue=Math.random()*360;
    popFx.push({kind:"ring", x:cx, y:cy, r:CELL*0.15, life:0, max:420, hue:baseHue, sp:0.26});
  }else if(currentStage===3){
    // 業火の火の粉
    const FIRE=["#ff3b00","#ff7a00","#ffb300","#ff5500"];
    for(let i=0;i<10;i++){
      const ang=Math.random()*Math.PI*2;
      const sp=Math.random()*2.2+0.8;
      popFx.push({
        kind:"ember", x:cx, y:cy,
        vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp - 1.2,
        r:Math.random()*3+1.5, color:FIRE[(Math.random()*FIRE.length)|0],
        life:0, max:Math.random()*300+400
      });
    }
  }
}
function updatePopFx(dt){
  for(const f of popFx){
    f.life+=dt;
    if(f.kind==="ring"){ f.r += dt*(f.sp||0.18); continue; }
    if(f.kind==="flash"||f.kind==="bloodflash"){ continue; }
    f.x+=f.vx; f.y+=f.vy;
    if(f.kind===2){ f.vx*=0.96; f.vy*=0.96; }
    if(f.kind==="blood"){ f.vy+=f.grav; f.vx*=0.99; }
    if(f.kind==="ember"){ f.vy+=0.03; f.vx*=0.97; f.r*=0.992; }
  }
  popFx = popFx.filter(f=>f.life<f.max);
}
function drawPopFx(){
  for(const f of popFx){
    const t=f.life/f.max;
    const a=1-t;
    if(f.kind==="bloodflash"){
      ctx.save();
      ctx.globalAlpha=a*0.6;
      const grd=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
      grd.addColorStop(0,'rgba(180,10,10,'+(a*0.85)+')');
      grd.addColorStop(0.5,'rgba(120,0,0,'+(a*0.4)+')');
      grd.addColorStop(1,'rgba(80,0,0,0)');
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }else if(f.kind==="blood"){
      ctx.save();
      ctx.globalAlpha=Math.min(1,a*1.3);
      ctx.fillStyle=f.color;
      ctx.beginPath();
      // 雫っぽく縦長
      const stretch=1+Math.min(2,Math.abs(f.vy)*0.2);
      ctx.ellipse(f.x,f.y,f.r,f.r*stretch,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }else if(f.kind==="ember"){
      ctx.save();
      ctx.globalAlpha=a;
      const grd=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*2.5);
      grd.addColorStop(0,f.color);
      grd.addColorStop(1,'rgba(255,80,0,0)');
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r*2.5,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }else if(f.kind==="flash"){
      ctx.save();
      ctx.globalAlpha=a*0.7;
      const grd=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
      grd.addColorStop(0,'hsla('+f.hue+',100%,92%,'+(a*0.9)+')');
      grd.addColorStop(0.5,'hsla('+f.hue+',100%,70%,'+(a*0.4)+')');
      grd.addColorStop(1,'hsla('+f.hue+',100%,60%,0)');
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }else if(f.kind==="ring"){
      ctx.save();
      ctx.globalAlpha=a*0.9;
      ctx.strokeStyle='hsl('+f.hue+',100%,72%)';
      ctx.lineWidth=4*a+0.5;
      ctx.shadowColor='hsl('+f.hue+',100%,65%)';
      ctx.shadowBlur=8*a;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }else if(f.kind===2){
      ctx.save();
      ctx.globalAlpha=a;
      const grd=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*3);
      grd.addColorStop(0,'hsla('+f.hue+',100%,85%,'+a+')');
      grd.addColorStop(0.5,'hsla('+f.hue+',100%,65%,'+(a*0.7)+')');
      grd.addColorStop(1,'hsla('+f.hue+',100%,60%,0)');
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r*3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
}

function anyActive(){
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      if(board[r][c] && board[r][c].st!=="idle") return true;
  return false;
}

/* ================= せり上げ ================= */
function riseStep(){
  for(let c=0;c<COLS;c++){
    if(board[ROWS-1][c]){ gameOver(); return; }
  }
  for(let r=ROWS-1;r>=1;r--) board[r]=board[r-1];
  board[0]=nextRow;
  nextRow=genRow();
  cursorY=Math.min(cursorY+1, ROWS-1);
  score+=2;
  sndRise();
}

/* ================= メインループ ================= */
let lastT=performance.now();
function loop(now){
  const dt=Math.min(50, now-lastT);
  lastT=now;
  if(running){
    update(dt);
  }
  render(now);
  requestAnimationFrame(loop);
}
function update(dt){
  elapsed += dt;
  level = 1 + Math.floor(elapsed/45000);
  hudLevel.textContent = level;
  riseSpeed = BASE_RISE * (1 + (level-1)*0.45);

  if(swapAnim){ swapAnim.t+=dt; if(swapAnim.t>=SWAP_MS) swapAnim=null; }

  // 落下
  fallTimer+=dt;
  let fellNow=false;
  while(fallTimer>=FALL_INT){
    fallTimer-=FALL_INT;
    if(doFallPass()) fellNow=true;
  }

  // マッチ
  handleMatches();
  progressPops(dt);

  const active = anyActive();
  const floating = anyFloating();

  // 盤面が完全に静止したら連鎖カウントとフラグをリセット
  if(!active && !floating && !fellNow){
    if(chainCount>0){
      chainCount=0;
      for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
        const p=board[r][c]; if(p) p.chain=false;
      }
    }
  }

  // せり上げ(消滅演出中は停止)
  if(!active){
    const sp = riseSpeed * (raiseHeld ? 22 : 1);
    riseOffset += dt*sp;
    while(riseOffset>=1){
      riseOffset-=1;
      riseStep();
      if(over) return;
    }
  }

  // 浮遊テキスト
  floats.forEach(f=>f.t+=dt);
  floats=floats.filter(f=>f.t<1100);

  // 消去エフェクト更新
  updatePopFx(dt);

  if(shake>0) shake=Math.max(0,shake-dt*0.03);
  hudScore.textContent=score.toLocaleString();
}
function updateHUD(){
  hudScore.textContent=score.toLocaleString();
  hudMax.textContent = maxChain>=2 ? maxChain+"連鎖" : "-";
}

/* ================= パネル描画 =================
   各シリーズのアイコンは本ゲーム用に簡略化したオリジナル描画 */
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function drawIcon(t,x,y,s){
  ctx.save();
  ctx.translate(x,y);
  const u=s/24; // 24px基準
  ctx.lineWidth=Math.max(1.4, 1.8*u);
  ctx.strokeStyle="rgba(255,255,255,.95)";
  ctx.fillStyle="rgba(255,255,255,.95)";
  ctx.lineJoin="round"; ctx.lineCap="round";
  switch(t){
    case 0: // MD マグネットポンプ: ポンプヘッド円+モータ胴+吐出口
      ctx.beginPath(); ctx.arc(7*u,13*u,5*u,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(7*u,13*u,1.6*u,0,Math.PI*2); ctx.fill();
      roundRectPath(11*u,9.5*u,10*u,7*u,1.5*u); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(7*u,8*u); ctx.lineTo(7*u,4.5*u); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(5*u,4.5*u); ctx.lineTo(9*u,4.5*u); ctx.stroke();
      break;
    case 1: // MX 渦巻ケーシング
      ctx.beginPath(); ctx.arc(12*u,13*u,6*u,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(12*u,13*u,2.6*u,0,Math.PI*2); ctx.stroke();
      // 接線方向の吐出
      ctx.beginPath(); ctx.moveTo(16.8*u,9.5*u); ctx.lineTo(16.8*u,4*u); ctx.lineTo(20*u,4*u); ctx.stroke();
      // 渦
      ctx.beginPath(); ctx.arc(12*u,13*u,4.3*u, -0.4, 2.2); ctx.stroke();
      break;
    case 2: // EH 定量ポンプ: 縦型本体+調整ダイヤル
      roundRectPath(8*u,9*u,8*u,11*u,1.5*u); ctx.stroke();
      ctx.beginPath(); ctx.arc(12*u,6*u,3.2*u,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(12*u,6*u); ctx.lineTo(12*u,3.6*u); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(9.5*u,13*u); ctx.lineTo(14.5*u,13*u); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(9.5*u,16*u); ctx.lineTo(14.5*u,16*u); ctx.stroke();
      break;
    case 3: // YTS ダイヤフラム: 左右チャンバ+中央マニホールド
      ctx.beginPath(); ctx.arc(7*u,12*u,4.4*u,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(17*u,12*u,4.4*u,0,Math.PI*2); ctx.stroke();
      roundRectPath(10.4*u,9.6*u,3.2*u,4.8*u,1*u); ctx.fill();
      ctx.beginPath(); ctx.moveTo(12*u,9.6*u); ctx.lineTo(12*u,4.6*u); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(9.4*u,4.6*u); ctx.lineTo(14.6*u,4.6*u); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(12*u,14.4*u); ctx.lineTo(12*u,19.4*u); ctx.stroke();
      break;
    case 4: // モータ: 胴+冷却フィン+シャフト
      roundRectPath(5*u,8*u,12*u,9*u,2*u); ctx.stroke();
      for(let i=0;i<3;i++){
        ctx.beginPath();
        ctx.moveTo((7.5+i*3.4)*u,8*u); ctx.lineTo((7.5+i*3.4)*u,5.6*u);
        ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(17*u,12.5*u); ctx.lineTo(20.5*u,12.5*u); ctx.stroke();
      ctx.beginPath(); ctx.arc(11*u,12.5*u,2*u,0,Math.PI*2); ctx.stroke();
      break;
    case 5: // 継手: エルボ+フランジボルト
      ctx.beginPath();
      ctx.moveTo(6*u,5*u); ctx.lineTo(6*u,12*u);
      ctx.arc(10*u,12*u,4*u,Math.PI,Math.PI/2,true);
      ctx.lineTo(19*u,16*u);
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(3.5*u,5.5*u); ctx.lineTo(8.5*u,5.5*u); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(18.5*u,13.5*u); ctx.lineTo(18.5*u,18.5*u); ctx.stroke();
      ctx.beginPath(); ctx.arc(4.6*u,5.5*u,0.8*u,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(7.4*u,5.5*u,0.8*u,0,Math.PI*2); ctx.fill();
      break;
  }
  ctx.restore();
}
function roundRectPath(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawPanel(p, px, py, dim, now){
  const s=SERIES[p.t];
  const pad=1.5;
  const x=px+pad, y=py+pad, w=CELL-pad*2, h=CELL-pad*2;

  let flash=false, white=false;
  if(p.st==="match"){
    if(p.timer<FLASH_MS) flash = Math.floor(p.timer/70)%2===0;
    else white=true;
  }
  ctx.save();
  ctx.globalAlpha = dim?0.38:1;

  roundRect(x,y,w,h,5);
  ctx.save(); ctx.clip();
  const img=PHOTO_IMGS[p.t];
  if(img.complete&&img.naturalWidth>0){
    ctx.drawImage(img,x,y,w,h);
  }else{
    ctx.fillStyle=s.color; ctx.fillRect(x,y,w,h);
  }
  if(flash||white){
    ctx.fillStyle=white?"rgba(255,255,255,.92)":"rgba(255,255,255,.55)";
    ctx.fillRect(x,y,w,h);
  }
  const bh=Math.max(10,CELL*0.24);
  const keepA=ctx.globalAlpha;
  ctx.globalAlpha=keepA*0.92;
  ctx.fillStyle=s.color; ctx.fillRect(x,y+h-bh,w,bh);
  ctx.globalAlpha=keepA;
  ctx.fillStyle="#fff";
  ctx.font=`800 ${Math.max(7,bh*0.62)}px sans-serif`;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(s.key,x+w/2,y+h-bh/2+0.5);
  ctx.restore();
  ctx.strokeStyle=flash||white?"#ffffff":s.color;
  ctx.lineWidth=2;
  roundRect(x+1,y+1,w-2,h-2,4); ctx.stroke();
  ctx.restore();
}

/* ================= 描画 ================= */
function render(now){
  ctx.clearRect(0,0,COLS*CELL,ROWS*CELL);

  let sx=0, sy=0;
  if(shake>0){
    sx=(Math.random()-0.5)*shake;
    sy=(Math.random()-0.5)*shake;
  }
  ctx.save();
  ctx.translate(sx,sy);

  // 背景グリッド
  ctx.strokeStyle="rgba(255,255,255,.04)";
  ctx.lineWidth=1;
  for(let c=1;c<COLS;c++){
    ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,ROWS*CELL); ctx.stroke();
  }

  // 危険ライン
  ctx.fillStyle="rgba(255,80,60,.07)";
  ctx.fillRect(0,0,COLS*CELL,CELL*1.5);

  const yOf = r => (ROWS-1-r-riseOffset)*CELL + CELL*0 + riseOffset*0 + (0);
  // 正:下端基準 → y(r) = (ROWS-1-r)*CELL - riseOffset*CELL + CELL*riseOffset*0
  function rowY(r){ return (ROWS-1-r)*CELL - riseOffset*CELL + CELL; } // セル下端
  function cellY(r){ return (ROWS-1-r)*CELL - riseOffset*CELL; }

  // 本体パネル
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const p=board[r][c];
      if(!p) continue;
      let px=c*CELL, py=cellY(r)+CELL; // +CELLで1段分下げ(プレビュー分のオフセット)
      py = cellY(r) + CELL*0; // 調整は下で
      px=c*CELL; py=(ROWS-1-r)*CELL - riseOffset*CELL;
      // 入替アニメ
      if(swapAnim && r===swapAnim.y){
        const prog=Math.min(1,swapAnim.t/SWAP_MS);
        if(c===swapAnim.x)   px += (1-prog)*CELL;
        if(c===swapAnim.x+1) px -= (1-prog)*CELL;
      }
      drawPanel(p, px, py, false, now);
    }
  }

  // 次段プレビュー(暗め・下からせり上がってくる)
  for(let c=0;c<COLS;c++){
    const p=nextRow[c];
    if(!p) continue;
    const px=c*CELL, py=ROWS*CELL - riseOffset*CELL;
    drawPanel(p, px, py, true, now);
  }
  // プレビューの上に薄い影
  ctx.fillStyle="rgba(0,0,0,.25)";
  ctx.fillRect(0, ROWS*CELL - riseOffset*CELL, COLS*CELL, riseOffset*CELL);

  // カーソル
  if(running){
    const cx=cursorX*CELL, cy2=(ROWS-1-cursorY)*CELL - riseOffset*CELL;
    const pulse = 1 + Math.sin(now/180)*0.6;
    ctx.strokeStyle="#ffffff";
    ctx.lineWidth=2.5;
    ctx.shadowColor="rgba(255,255,255,.7)";
    ctx.shadowBlur=4*pulse;
    drawBracket(cx-2, cy2-2, CELL*2+4, CELL+4);
    ctx.shadowBlur=0;
  }

  // 消去エフェクト
  drawPopFx();

  // 浮遊テキスト
  floats.forEach(f=>{
    const p=f.t/1100;
    ctx.save();
    ctx.globalAlpha = p<0.75 ? 1 : 1-(p-0.75)/0.25;
    ctx.font=`900 ${f.big? Math.max(15,CELL*0.42) : Math.max(12,CELL*0.3)}px sans-serif`;
    ctx.textAlign="center";
    ctx.lineWidth=4;
    ctx.strokeStyle="rgba(0,0,0,.65)";
    ctx.fillStyle=f.color;
    const yy=f.y - p*34;
    const xx=Math.min(Math.max(f.x, CELL*1.2), COLS*CELL-CELL*1.2);
    ctx.strokeText(f.text, xx, yy);
    ctx.fillText(f.text, xx, yy);
    ctx.restore();
  });

  ctx.restore();
}
function drawBracket(x,y,w,h){
  const L=Math.min(11, w*0.14);
  ctx.beginPath();
  // 四隅のみのブラケット
  ctx.moveTo(x,y+L); ctx.lineTo(x,y); ctx.lineTo(x+L,y);
  ctx.moveTo(x+w-L,y); ctx.lineTo(x+w,y); ctx.lineTo(x+w,y+L);
  ctx.moveTo(x+w,y+h-L); ctx.lineTo(x+w,y+h); ctx.lineTo(x+w-L,y+h);
  ctx.moveTo(x+L,y+h); ctx.lineTo(x,y+h); ctx.lineTo(x,y+h-L);
  // 中央の仕切り
  ctx.moveTo(x+w/2, y); ctx.lineTo(x+w/2, y+4);
  ctx.moveTo(x+w/2, y+h); ctx.lineTo(x+w/2, y+h-4);
  ctx.stroke();
}

/* ================= 入力 ================= */
function moveCursor(dx,dy){
  if(!running) return;
  cursorX=Math.max(0,Math.min(COLS-2,cursorX+dx));
  cursorY=Math.max(0,Math.min(ROWS-1,cursorY+dy));
}
document.addEventListener("keydown",e=>{
  if(e.repeat && (e.key===" "||e.key==="z"||e.key==="Z")) return;
  switch(e.key){
    case "ArrowLeft": moveCursor(-1,0); e.preventDefault(); break;
    case "ArrowRight": moveCursor(1,0); e.preventDefault(); break;
    case "ArrowUp": moveCursor(0,1); e.preventDefault(); break;
    case "ArrowDown": moveCursor(0,-1); e.preventDefault(); break;
    case " ": case "z": case "Z": trySwap(); e.preventDefault(); break;
    case "x": case "X": case "Shift": raiseHeld=true; e.preventDefault(); break;
    case "Enter":
      if(!running && !overlay.classList.contains("hidden")){
        const b=overlay.querySelector("button"); if(b) b.click();
      }
      break;
  }
});
document.addEventListener("keyup",e=>{
  if(e.key==="x"||e.key==="X"||e.key==="Shift") raiseHeld=false;
});

// ボタン
function bindHold(id, fn){
  const el=document.getElementById(id);
  let iv=null;
  const down=ev=>{ev.preventDefault(); fn(); iv=setInterval(fn,130);};
  const up=()=>{if(iv){clearInterval(iv);iv=null;}};
  el.addEventListener("pointerdown",down);
  el.addEventListener("pointerup",up);
  el.addEventListener("pointerleave",up);
  el.addEventListener("pointercancel",up);
}
bindHold("bt-left", ()=>moveCursor(-1,0));
bindHold("bt-right",()=>moveCursor(1,0));
bindHold("bt-up",   ()=>moveCursor(0,1));
bindHold("bt-down", ()=>moveCursor(0,-1));
document.getElementById("bt-swap").addEventListener("pointerdown",e=>{e.preventDefault();trySwap();});
(()=>{
  const el=document.getElementById("bt-raise");
  el.addEventListener("pointerdown",e=>{e.preventDefault();raiseHeld=true;});
  ["pointerup","pointerleave","pointercancel"].forEach(ev=>el.addEventListener(ev,()=>raiseHeld=false));
})();

// 盤面タップ
cv.addEventListener("pointerdown",e=>{
  e.preventDefault();
  if(!running) return;
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  let c=Math.floor(mx/CELL), rr=ROWS-1-Math.floor((my+riseOffset*CELL)/CELL);
  c=Math.max(0,Math.min(COLS-1,c));
  rr=Math.max(0,Math.min(ROWS-1,rr));
  const tx=Math.min(c, COLS-2);
  if(tx===cursorX && rr===cursorY){
    trySwap();
  }else{
    cursorX=tx; cursorY=rr;
  }
});

/* ===== 背景エフェクト ===== */
const bgCv = document.getElementById("bg-canvas");
const bgCtx = bgCv.getContext("2d");
let bgRaf = null;
let bgParticles = [];
let bgStage = 0;

function resizeBgCanvas(){
  bgCv.width = window.innerWidth;
  bgCv.height = window.innerHeight;
}
resizeBgCanvas();
window.addEventListener("resize", resizeBgCanvas);

/* ループ関数はトップレベルで定義(iOS WebView対応) */
function loopBg(){
  const W=bgCv.width, H=bgCv.height;
  bgCtx.clearRect(0,0,W,H);
  if(bgStage===2){
    bgParticles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      try{
        const R=p.r*8;
        const grd=bgCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,R);
        // 血の赤〜暗赤
        grd.addColorStop(0,'rgba('+(150+((p.tone*40)|0))+',20,20,'+Math.min(1,p.alpha+0.2)+')');
        grd.addColorStop(0.4,'rgba(120,8,8,'+p.alpha+')');
        grd.addColorStop(1,'rgba(60,0,0,0)');
        bgCtx.beginPath();
        bgCtx.arc(p.x,p.y,R,0,Math.PI*2);
        bgCtx.fillStyle=grd; bgCtx.fill();
      }catch(e){}
    });
  }else if(bgStage===3){
    bgParticles.forEach(p=>{
      p.y+=p.vy; p.x+=p.vx; p.sway+=0.04;
      p.x += Math.sin(p.sway)*0.5;
      p.r*=0.994;
      if(p.y<-20 || p.r<1){ p.y=H+20; p.x=Math.random()*W; p.r=Math.random()*5+2; }
      bgCtx.save();
      bgCtx.globalAlpha=p.alpha*Math.min(1,p.r/3);
      const R=p.r*3;
      const grd=bgCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,R);
      grd.addColorStop(0,p.color);
      grd.addColorStop(0.5,'rgba(255,80,0,'+(p.alpha*0.5)+')');
      grd.addColorStop(1,'rgba(120,20,0,0)');
      bgCtx.fillStyle=grd;
      bgCtx.beginPath(); bgCtx.arc(p.x,p.y,R,0,Math.PI*2); bgCtx.fill();
      bgCtx.restore();
    });
  }
  bgRaf=requestAnimationFrame(loopBg);
}

function stopBgEffect(){
  bgStage=0;
  if(bgRaf){ cancelAnimationFrame(bgRaf); bgRaf=null; }
  bgCv.classList.remove("active");
  bgParticles=[];
}

function startBgEffect(stage){
  stopBgEffect();
  if(stage===1) return;
  bgStage=stage;
  resizeBgCanvas();
  bgCv.classList.add("active");
  bgParticles=[];
  const W=bgCv.width, H=bgCv.height;
  if(stage===2){
    for(let i=0;i<90;i++) bgParticles.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*7+2, tone:Math.random(),
      vy:(Math.random()-.5)*0.8, vx:(Math.random()-.5)*0.8,
      alpha:Math.random()*.5+.35
    });
  }else if(stage===3){
    var FIRE_COLORS=["#ff3b00","#ff7a00","#ffb300","#ff5a00","#ffd000"];
    for(let i=0;i<110;i++){
      bgParticles.push({
        x:Math.random()*W, y:Math.random()*H,
        r:Math.random()*5+2,
        color:FIRE_COLORS[(Math.random()*FIRE_COLORS.length)|0],
        vy:-(Math.random()*1.6+0.8), vx:(Math.random()-.5)*0.3,
        sway:Math.random()*Math.PI*2,
        alpha:Math.random()*.5+.4
      });
    }
  }
  bgRaf=requestAnimationFrame(loopBg);
}

/* 起動時の初期値(タイトル画面の背景描画用) */
riseOffset=0; raiseHeld=false;
chainCount=0; maxChain=0; score=0; level=1; elapsed=0;
fallTimer=0; swapAnim=null; floats=[]; shake=0;

/* スマホのダブルタップ拡大・ピンチ拡大を完全抑止 */
let lastTouchEnd = 0;
document.addEventListener("touchstart", e => {
  if(e.touches.length > 1) e.preventDefault(); // ピンチ開始を潰す
}, {passive:false});
document.addEventListener("touchend", e => {
  const now = Date.now();
  if(now - lastTouchEnd < 350) e.preventDefault(); // ダブルタップを潰す
  lastTouchEnd = now;
}, {passive:false});
document.addEventListener("touchmove", e => {
  if(e.touches.length > 1) e.preventDefault(); // ピンチ中を潰す
}, {passive:false});
document.addEventListener("gesturestart", e => e.preventDefault(), {passive:false});
document.addEventListener("gesturechange", e => e.preventDefault(), {passive:false});
document.addEventListener("gestureend", e => e.preventDefault(), {passive:false});
document.addEventListener("dblclick", e => e.preventDefault());
// ページ全体のスクロール・ズームをブロック
document.body.addEventListener("touchmove", e => e.preventDefault(), {passive:false});

initBoard();
requestAnimationFrame(loop);
